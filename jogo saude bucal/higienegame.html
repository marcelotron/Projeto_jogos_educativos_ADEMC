<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Higiene</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#d8ecf3;
    --grid:#c4e0ea;
    --card:#ffffff;
    --blue:#2f93d4;
    --blue-dark:#1f6fa8;
    --red:#ee5a3f;
    --red-dark:#d4452c;
    --gray:#d0d6da;
    --gray-text:#5b6b74;
    --green:#5cb85c;
    --footer:#bfe0eb;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Fredoka',sans-serif;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    overflow:hidden;
  }
  /* fundo com grade quadriculada */
  .stage{
    position:relative;
    width:min(960px,100%);
    height:min(700px,96vh);
    background:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1.5px,transparent 1.5px),
      linear-gradient(90deg,var(--grid) 1.5px,transparent 1.5px);
    background-size:84px 84px;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 18px 50px rgba(31,111,168,.25);
  }
  .screen{
    position:absolute;inset:0;
    display:none;
    flex-direction:column;
    padding:38px 44px 0;
  }
  .screen.active{display:flex;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* barra inferior */
  .footer{
    position:absolute;left:0;right:0;bottom:0;
    height:150px;
    background:linear-gradient(180deg,#cfe6ef 0%,var(--footer) 55%,#aed6e3 100%);
  }
  .btn{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:22px;
    letter-spacing:1px;
    color:#fff;
    background:var(--red);
    border:none;
    border-radius:40px;
    padding:18px 56px;
    cursor:pointer;
    box-shadow:0 6px 0 var(--red-dark);
    transition:transform .08s ease, box-shadow .08s ease, opacity .2s;
    text-transform:uppercase;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--red-dark);}
  .btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:0 6px 0 var(--red-dark);}
  .btn-wrap{
    position:absolute;left:0;right:0;bottom:46px;
    display:flex;justify-content:center;z-index:5;
  }

  /* ---------- TELA INICIAL ---------- */
  #start{align-items:center;justify-content:center;text-align:center;padding-bottom:150px;}
  #start h1{
    color:var(--blue);
    font-size:60px;
    font-weight:700;
    line-height:1.05;
    text-transform:uppercase;
    text-shadow:0 3px 0 #fff;
  }
  #start p{
    color:var(--gray-text);
    font-size:21px;
    margin:18px 0 30px;
    max-width:520px;
  }
  .hero{margin-bottom:20px;}

  /* ---------- TELA DE PERGUNTA ---------- */
  .topbar{
    display:flex;align-items:center;gap:14px;
    margin-bottom:6px;
  }
  .progress-track{
    flex:1;height:14px;background:#fff;border-radius:10px;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.12);overflow:hidden;
  }
  .progress-fill{
    height:100%;background:var(--green);border-radius:10px;
    width:0%;transition:width .4s ease;
  }
  .progress-label{
    color:var(--blue-dark);font-weight:600;font-size:16px;
    white-space:nowrap;
  }
  .q-main{
    display:flex;gap:30px;margin-top:18px;
  }
  .q-left{flex:1;}
  .q-text{
    color:var(--blue);
    font-size:33px;
    font-weight:600;
    line-height:1.18;
    text-transform:uppercase;
    margin-bottom:26px;
  }
  .q-pic{
    width:200px;height:200px;flex-shrink:0;
    background:#fff;
    border:5px solid var(--blue-dark);
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    padding:14px;
  }
  .q-pic svg{width:100%;height:100%;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .option{
    display:flex;align-items:center;gap:16px;
    padding:8px 6px;
    cursor:pointer;
    border-radius:14px;
    transition:background .15s;
  }
  .option:hover{background:rgba(47,147,212,.08);}
  .bullet{
    width:34px;height:34px;flex-shrink:0;
    border-radius:50%;
    background:var(--gray);
    border:3px solid #c2c8cc;
    transition:all .15s;
  }
  .option.selected .bullet{
    background:var(--blue);border-color:var(--blue-dark);
    box-shadow:0 0 0 4px rgba(47,147,212,.25);
  }
  .option.correct .bullet{background:var(--green);border-color:#3f8f3f;}
  .option.wrong .bullet{background:var(--red);border-color:var(--red-dark);}
  .option-text{
    color:var(--gray-text);
    font-size:24px;font-weight:500;
    text-transform:uppercase;
  }
  .option.selected .option-text{color:var(--blue-dark);}
  .shake{animation:shake .4s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%,60%{transform:translateX(-9px);}
    40%,80%{transform:translateX(9px);}
  }

  /* ---------- TELA DE FEEDBACK ---------- */
  .feedback{flex-direction:row;align-items:center;gap:24px;padding-bottom:150px;}
  .fb-char{width:300px;flex-shrink:0;display:flex;justify-content:center;}
  .fb-char svg{width:260px;height:auto;}
  .fb-text{
    color:var(--blue);
    font-size:33px;font-weight:600;line-height:1.22;
    text-transform:uppercase;
  }
  .fb-text.bad{color:var(--red);}

  /* ---------- TELA FINAL ---------- */
  #end{align-items:center;justify-content:center;text-align:center;padding-bottom:150px;}
  #end h1{
    color:var(--blue);font-size:52px;font-weight:700;
    text-transform:uppercase;text-shadow:0 3px 0 #fff;
  }
  .score-badge{
    margin:22px 0 10px;
    background:#fff;border:5px solid var(--blue-dark);
    border-radius:20px;padding:20px 46px;
  }
  .score-badge .num{
    color:var(--green);font-size:64px;font-weight:700;line-height:1;
  }
  .score-badge .lbl{
    color:var(--gray-text);font-size:18px;font-weight:500;
    text-transform:uppercase;letter-spacing:1px;
  }
  #end p{color:var(--gray-text);font-size:22px;margin-bottom:8px;}

  /* cronometro na barra de perguntas */
  .timer-chip{
    display:flex;align-items:center;gap:6px;
    background:#fff;border-radius:10px;
    padding:4px 12px;
    color:var(--blue-dark);font-weight:600;font-size:16px;
    box-shadow:0 1px 3px rgba(0,0,0,.12);
  }
  .timer-chip svg{width:16px;height:16px;}

  /* botao secundario (tela inicial) */
  .btn-ghost{
    font-family:'Fredoka',sans-serif;
    font-weight:600;font-size:18px;letter-spacing:1px;
    color:var(--blue-dark);
    background:#fff;
    border:3px solid var(--blue);
    border-radius:40px;
    padding:12px 38px;
    cursor:pointer;
    text-transform:uppercase;
    transition:transform .08s ease, background .15s;
  }
  .btn-ghost:hover{transform:translateY(-2px);background:#eef7fc;}
  .btn-ghost:active{transform:translateY(1px);}

  .stat-line{
    color:var(--blue-dark);font-size:22px;font-weight:500;
    margin-bottom:4px;
  }

  /* ---------- TELA DE HISTORICO ---------- */
  #history{padding-bottom:150px;}
  #history h1{
    color:var(--blue);font-size:40px;font-weight:700;
    text-transform:uppercase;text-align:center;
    text-shadow:0 2px 0 #fff;margin-bottom:6px;
  }
  .hist-sub{
    text-align:center;color:var(--gray-text);font-size:17px;margin-bottom:14px;
  }
  .hist-list{
    flex:1;overflow-y:auto;
    display:flex;flex-direction:column;gap:9px;
    padding-right:6px;
  }
  .hist-row{
    display:flex;align-items:center;gap:14px;
    background:#fff;border-radius:14px;
    padding:12px 18px;
    box-shadow:0 2px 6px rgba(31,111,168,.12);
  }
  .hist-rank{
    width:34px;height:34px;flex-shrink:0;
    background:var(--blue);color:#fff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:16px;
  }
  .hist-row.best .hist-rank{background:var(--green);}
  .hist-info{flex:1;}
  .hist-date{color:var(--gray-text);font-size:14px;}
  .hist-main{color:var(--blue-dark);font-size:20px;font-weight:600;}
  .hist-trend{
    font-size:15px;font-weight:600;white-space:nowrap;
    display:flex;align-items:center;gap:5px;
  }
  .trend-up{color:var(--green);}
  .trend-down{color:var(--red);}
  .trend-same{color:var(--gray-text);}
  .hist-empty{
    text-align:center;color:var(--gray-text);
    font-size:20px;margin-top:60px;
  }
  .hist-actions{
    display:flex;justify-content:center;gap:14px;
    margin-top:12px;
  }

  @media(max-width:680px){
    .stage{height:96vh;}
    .screen{padding:24px 22px 0;}
    .q-text{font-size:24px;}
    .q-pic{width:130px;height:130px;}
    .option-text{font-size:18px;}
    #start h1{font-size:40px;}
    .feedback{flex-direction:column;gap:12px;}
    .fb-char svg{width:160px;}
    .fb-text{font-size:23px;}
  }
</style>
</head>
<body>
<div class="stage" id="stage">

  <!-- ====== TELA INICIAL ====== -->
  <section class="screen active" id="start">
    <div class="hero">
      <!-- sabonete com bolhas -->
      <svg width="190" height="170" viewBox="0 0 190 170">
        <ellipse cx="95" cy="150" rx="70" ry="12" fill="#1f6fa8" opacity=".15"/>
        <rect x="40" y="78" width="110" height="62" rx="20" fill="#7ec8ec"/>
        <rect x="40" y="70" width="110" height="62" rx="20" fill="#a8dbf3"/>
        <ellipse cx="78" cy="92" rx="22" ry="14" fill="#fff" opacity=".55"/>
        <circle cx="60" cy="48" r="16" fill="#fff" opacity=".9"/>
        <circle cx="92" cy="32" r="22" fill="#fff" opacity=".95"/>
        <circle cx="128" cy="50" r="14" fill="#fff" opacity=".9"/>
        <circle cx="112" cy="60" r="9" fill="#fff" opacity=".8"/>
        <circle cx="86" cy="30" r="6" fill="#bfe6f7"/>
        <circle cx="56" cy="46" r="4" fill="#bfe6f7"/>
      </svg>
    </div>
    <h1>Jogo da Higiene</h1>
    <p>Responda as perguntas e aprenda como cuidar do corpo e ficar sempre saudável!</p>
    <button class="btn-ghost" id="historyBtn">Ver resultados</button>
    <div class="btn-wrap">
      <button class="btn" id="startBtn">Começar</button>
    </div>
  </section>

  <!-- ====== TELA DE PERGUNTA ====== -->
  <section class="screen" id="quiz">
    <div class="topbar">
      <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
      <div class="timer-chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6"/></svg>
        <span id="timer">00:00</span>
      </div>
      <div class="progress-label" id="counter">1 / 10</div>
    </div>
    <div class="q-main">
      <div class="q-left">
        <div class="q-text" id="qText">Pergunta</div>
        <div class="options" id="options"></div>
      </div>
      <div class="q-pic" id="qPic"></div>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="confirmBtn" disabled>Confirmar</button>
    </div>
  </section>

  <!-- ====== TELA DE FEEDBACK ====== -->
  <section class="screen" id="feedback">
    <div class="feedback">
      <div class="fb-char" id="fbChar"></div>
      <div class="fb-text" id="fbText"></div>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="continueBtn">Continuar</button>
    </div>
  </section>

  <!-- ====== TELA FINAL ====== -->
  <section class="screen" id="end">
    <h1 id="endTitle">Parabéns!</h1>
    <div class="score-badge">
      <div class="num" id="finalScore">0</div>
      <div class="lbl">acertos de 10</div>
    </div>
    <div class="stat-line">⏱ Tempo: <strong id="finalTime">00:00</strong></div>
    <p id="endMsg">Você é craque na higiene!</p>
    <div class="btn-wrap" style="gap:14px;align-items:center;">
      <button class="btn-ghost" id="endHomeBtn">Início</button>
      <button class="btn" id="restartBtn">Jogar de novo</button>
    </div>
  </section>

  <!-- ====== TELA DE HISTÓRICO ====== -->
  <section class="screen" id="history">
    <h1>Resultados</h1>
    <div class="hist-sub" id="histSub">Compare suas partidas e veja sua evolução</div>
    <div class="hist-list" id="histList"></div>
    <div class="hist-actions">
      <button class="btn-ghost" id="clearHistBtn">Limpar histórico</button>
      <button class="btn-ghost" id="backHistBtn">Voltar</button>
    </div>
  </section>

  <div class="footer"></div>
</div>

<script>
/* ================= EFEITOS SONOROS (Web Audio API) ================= */
let actx;
function audio(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(freq,start,dur,type='sine',vol=.25){
  const a=audio();
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(a.destination);
  const t=a.currentTime+start;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.03);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.start(t); o.stop(t+dur+.05);
}
const sfx={
  click(){ tone(420,0,.09,'triangle',.18); },
  correct(){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.1,.32,'triangle',.22)); },
  wrong(){ tone(220,0,.22,'sawtooth',.18); tone(160,.12,.3,'sawtooth',.18); },
  win(){ [523,587,659,784,880,1047].forEach((f,i)=>tone(f,i*.13,.5,'triangle',.22)); }
};

};

/* ================= PERSONAGEM (feedback) ================= */
function charSVG(happy){
  const mouth = happy
    ? `<path d="M86 118q14 14 28 0" stroke="#5e3526" stroke-width="5" fill="none" stroke-linecap="round"/>`
    : `<path d="M86 122q14 -8 28 0" stroke="#5e3526" stroke-width="5" fill="none" stroke-linecap="round"/>`;
  const brow = happy
    ? `<path d="M82 90q8 -5 16 0" stroke="#3a2418" stroke-width="4" fill="none" stroke-linecap="round"/>
       <path d="M102 90q8 -5 16 0" stroke="#3a2418" stroke-width="4" fill="none" stroke-linecap="round"/>`
    : `<path d="M82 92q8 4 16 0" stroke="#3a2418" stroke-width="4" fill="none" stroke-linecap="round"/>
       <path d="M102 92q8 4 16 0" stroke="#3a2418" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  return `<svg viewBox="0 0 200 280">
    <ellipse cx="100" cy="266" rx="58" ry="12" fill="#1f6fa8" opacity=".15"/>

/* ================= LÓGICA DO JOGO ================= */
const screens = {
  start:document.getElementById('start'),
  quiz:document.getElementById('quiz'),
  feedback:document.getElementById('feedback'),
  end:document.getElementById('end'),
  history:document.getElementById('history')
};
function show(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
}

let current=0, score=0, selected=null, locked=false;
let deck=[];               // perguntas embaralhadas da partida
let elapsed=0, timerId=null, startTime=0;

/* ---- embaralhar (Fisher-Yates) ---- */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ---- cronômetro ---- */
function fmtTime(s){
  const m=Math.floor(s/60), r=s%60;
  return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');
}
function startTimer(){
  elapsed=0; startTime=Date.now();
  document.getElementById('timer').textContent='00:00';
  clearInterval(timerId);
  timerId=setInterval(()=>{
    elapsed=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('timer').textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){ clearInterval(timerId); }

/* ---- início de partida ---- */
function newGame(){
  current=0; score=0;
  deck=shuffle(QUESTIONS);
  startTimer();
  loadQuestion();
  show('quiz');
}

function loadQuestion(){
  const q=deck[current];
  selected=null; locked=false;
  document.getElementById('confirmBtn').disabled=true;
  document.getElementById('qPic').innerHTML=PIC[q.pic];
  document.getElementById('qText').textContent=q.q;
  document.getElementById('counter').textContent=(current+1)+' / '+deck.length;
  document.getElementById('progress').style.width=(current/deck.length*100)+'%';

  const box=document.getElementById('options');
  box.innerHTML='';
  q.options.forEach((text,i)=>{
    const el=document.createElement('div');
    el.className='option';
    el.innerHTML='<div class="bullet"></div><div class="option-text">'+text+'</div>';
    el.onclick=()=>{
      if(locked) return;
      sfx.click();
      [...box.children].forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      selected=i;
      document.getElementById('confirmBtn').disabled=false;
    };
    box.appendChild(el);
  });
}

function confirmAnswer(){
  if(locked||selected===null) return;
  locked=true;
  const q=deck[current];
  const opts=document.getElementById('options').children;
  document.getElementById('confirmBtn').disabled=true;

  if(selected===q.answer){
    opts[selected].classList.add('correct');
    score++;
    sfx.correct();
    setTimeout(()=>showFeedback(true,q.good),700);
  }else{
    opts[selected].classList.add('wrong');
    opts[q.answer].classList.add('correct');
    sfx.wrong();
    document.querySelector('.q-main').classList.add('shake');
    setTimeout(()=>document.querySelector('.q-main').classList.remove('shake'),420);
    const correctText=q.options[q.answer].toLowerCase();
    setTimeout(()=>showFeedback(false,
      'Ops! Não foi dessa vez. A resposta certa é: '+correctText+' Continue tentando!'),900);
  }
}

function showFeedback(good,text){
  document.getElementById('fbChar').innerHTML=charSVG(good);
  const ft=document.getElementById('fbText');
  ft.textContent=text;
  ft.classList.toggle('bad',!good);
  show('feedback');
}

function nextStep(){
  sfx.click();
  current++;
  if(current>=deck.length){
    finish();
  }else{
    loadQuestion();
    show('quiz');
  }
}

function finish(){
  stopTimer();
  const total=deck.length;
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalTime').textContent=fmtTime(elapsed);
  let title,msg;
  if(score===total){ title='Incrível!'; msg='Você é um verdadeiro mestre da higiene!'; }
  else if(score>=total*0.7){ title='Muito bem!'; msg='Você sabe cuidar muito bem do seu corpo!'; }
  else if(score>=total*0.4){ title='Bom trabalho!'; msg='Continue praticando os hábitos de higiene!'; }
  else { title='Continue assim!'; msg='Vamos jogar de novo e aprender mais sobre higiene!'; }
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endMsg').textContent=msg;
  saveResult(score,total,elapsed);
  sfx.win();
  show('end');
}

/* ================= HISTÓRICO DE PARTIDAS ================= */
const HKEY='higienegame_historico';

function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(HKEY))||[]; }
  catch(e){ return []; }
}
function saveResult(score,total,time){
  try{
    const h=loadHistory();
    h.push({score,total,time,date:Date.now()});
    localStorage.setItem(HKEY,JSON.stringify(h.slice(-30)));
  }catch(e){/* armazenamento indisponível */}
}

function renderHistory(){
  const list=document.getElementById('histList');
  const sub=document.getElementById('histSub');
  const h=loadHistory();
  list.innerHTML='';

  if(h.length===0){
    sub.textContent='Compare suas partidas e veja sua evolução';
    list.innerHTML='<div class="hist-empty">Nenhuma partida registrada ainda.<br>Jogue para começar a comparar!</div>';
    return;
  }

  const bestScore=Math.max(...h.map(g=>g.score));
  const last=h[h.length-1];
  const first=h[0];
  if(h.length>=2){
    const diff=last.score-first.score;
    if(diff>0) sub.textContent='Você melhorou '+diff+' acerto(s) desde a primeira partida! 🎉';
    else if(diff<0) sub.textContent='Atenção: caiu '+Math.abs(diff)+' acerto(s) desde a primeira partida.';
    else sub.textContent='Seu desempenho está estável. Tente superar seu recorde!';
  }else{
    sub.textContent='Jogue mais uma vez para comparar a evolução.';
  }

  // mais recentes no topo
  [...h].reverse().forEach((g,idx)=>{
    const realIndex=h.length-idx;          // nº da partida (1 = primeira)
    const prev=h[h.length-idx-2];          // partida anterior
    const row=document.createElement('div');
    row.className='hist-row'+(g.score===bestScore?' best':'');

    let trend='<span class="trend-same">—</span>';
    if(prev){
      const d=g.score-prev.score;
      if(d>0) trend='<span class="hist-trend trend-up">▲ +'+d+'</span>';
      else if(d<0) trend='<span class="hist-trend trend-down">▼ '+d+'</span>';
      else trend='<span class="hist-trend trend-same">= igual</span>';
    }

    const dt=new Date(g.date);
    const dataStr=String(dt.getDate()).padStart(2,'0')+'/'+
                  String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear()+
                  ' às '+String(dt.getHours()).padStart(2,'0')+':'+
                  String(dt.getMinutes()).padStart(2,'0');

    row.innerHTML=
      '<div class="hist-rank">'+realIndex+'</div>'+
      '<div class="hist-info">'+
        '<div class="hist-main">'+g.score+'/'+g.total+' acertos · ⏱ '+fmtTime(g.time)+
        (g.score===bestScore?'  🏆':'')+'</div>'+
        '<div class="hist-date">Partida '+realIndex+' — '+dataStr+'</div>'+
      '</div>'+
      trend;
    list.appendChild(row);
  });
}

};

};

  if(confirm('Apagar todo o histórico de partidas?')){
    try{ localStorage.removeItem(HKEY); }catch(e){}
    renderHistory();
  }
};
