<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Higiene</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1a88d0;
    --blue-dark:#1460a0;
    --blue-light:#e8f4fd;
    --teal:#00b8a6;
    --red:#f05a40;
    --red-dark:#c8402a;
    --gray:#d0d6da;
    --gray-text:#5b6b74;
    --green:#3dba70;
    --green-dark:#2a9254;
    --gold:#f5c540;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Fredoka',sans-serif;
    background:radial-gradient(ellipse at 55% 15%,#9acfe8,#6ab4d6 50%,#4898bf);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    overflow:hidden;
  }

  /* ── Stage ── */
  .stage{
    position:relative;
    width:min(960px,100%);
    height:min(700px,96vh);
    background:linear-gradient(168deg,#d8f0fc 0%,#b8dff2 52%,#9dcee7 100%);
    border-radius:28px;
    overflow:hidden;
    box-shadow:
      0 28px 70px rgba(10,55,100,.32),
      0 4px 14px rgba(0,0,0,.14),
      inset 0 1px 0 rgba(255,255,255,.85);
  }
  /* Brilho de topo tipo vidro */
  .stage::before{
    content:'';
    position:absolute;
    top:0;left:12%;right:12%;height:3px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent);
    z-index:10;border-radius:0 0 4px 4px;
  }

  /* ── Bolhas flutuantes ── */
  .bbl{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle at 30% 28%,rgba(255,255,255,.92) 0%,rgba(255,255,255,.04) 72%);
    border:1.5px solid rgba(255,255,255,.55);
    animation:brise linear infinite;
    z-index:0;
  }
  @keyframes brise{
    0%  {transform:translateY(0) translateX(0) scale(1);   opacity:0;}
    6%  {opacity:.8;}
    50% {transform:translateY(-400px) translateX(18px) scale(.85);}
    94% {opacity:.3;}
    100%{transform:translateY(-820px) translateX(-10px) scale(.5);opacity:0;}
  }

  /* ── Telas ── */
  .screen{
    position:absolute;inset:0;
    display:none;flex-direction:column;
    padding:34px 44px 0;
    z-index:1;
  }
  .screen.active{display:flex;animation:fade .38s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(11px);}to{opacity:1;transform:none;}}

  /* ── Rodapé ondulado ── */
  .footer{
    position:absolute;left:0;right:0;bottom:0;
    height:164px;
    background:linear-gradient(180deg,transparent 0%,rgba(110,185,218,.18) 38%,rgba(82,158,200,.48) 100%);
    pointer-events:none;z-index:0;
  }
  .footer::before{
    content:'';position:absolute;top:-34px;left:-10%;right:-10%;
    height:68px;background:rgba(255,255,255,.16);border-radius:50%;
  }
  .footer::after{
    content:'';position:absolute;top:-18px;left:-4%;right:-4%;
    height:38px;background:rgba(255,255,255,.10);border-radius:50%;
  }

  /* ── Botões ── */
  .btn{
    font-family:'Fredoka',sans-serif;font-weight:700;
    font-size:21px;letter-spacing:1px;color:#fff;
    background:linear-gradient(180deg,#f47a62 0%,#f05a40 55%,#d84830 100%);
    border:none;border-radius:40px;padding:17px 56px;cursor:pointer;
    box-shadow:0 6px 0 var(--red-dark),0 10px 22px rgba(240,90,64,.38);
    transition:transform .09s ease,box-shadow .09s ease,opacity .2s;
    text-transform:uppercase;
  }
  .btn:hover{transform:translateY(-3px);box-shadow:0 9px 0 var(--red-dark),0 14px 28px rgba(240,90,64,.42);}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--red-dark),0 4px 8px rgba(240,90,64,.2);}
  .btn:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:0 6px 0 var(--red-dark);}
  .btn-wrap{
    position:absolute;left:0;right:0;bottom:44px;
    display:flex;justify-content:center;gap:14px;align-items:center;z-index:5;
  }
  .btn-ghost{
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:18px;letter-spacing:1px;
    color:var(--blue-dark);
    background:rgba(255,255,255,.82);
    border:3px solid var(--blue);border-radius:40px;padding:12px 36px;cursor:pointer;
    text-transform:uppercase;
    box-shadow:0 4px 12px rgba(26,136,208,.16);
    transition:transform .09s ease,background .15s,box-shadow .15s;
  }
  .btn-ghost:hover{transform:translateY(-2px);background:#fff;box-shadow:0 6px 18px rgba(26,136,208,.28);}
  .btn-ghost:active{transform:translateY(1px);}

  /* ════════════ TELA INICIAL ════════════ */
  #start{
    align-items:center;justify-content:center;
    text-align:center;padding-bottom:144px;gap:0;
  }
  .hero{
    margin-bottom:8px;
    animation:heroFloat 3.4s ease-in-out infinite;
    filter:drop-shadow(0 18px 16px rgba(20,96,160,.22));
  }
  @keyframes heroFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-16px);}
  }
  #start h1{
    font-size:58px;font-weight:700;
    line-height:1.05;text-transform:uppercase;
    background:linear-gradient(135deg,#1460a0 0%,#1a88d0 45%,#00b8a6 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 3px 0 rgba(255,255,255,.75));
  }
  .start-card{
    background:rgba(255,255,255,.66);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:2px solid rgba(255,255,255,.92);
    border-radius:20px;padding:13px 30px;
    margin:12px 0 18px;max-width:510px;
    box-shadow:0 4px 18px rgba(26,136,208,.1);
  }
  #start p{color:var(--blue-dark);font-size:19px;line-height:1.42;}

  /* ── Topbar ── */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .progress-track{
    flex:1;height:16px;
    background:rgba(255,255,255,.68);
    border-radius:10px;box-shadow:inset 0 2px 5px rgba(0,0,0,.1);overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,#3dba70,#2adc8a);
    border-radius:10px;width:0%;
    transition:width .52s cubic-bezier(.4,0,.2,1);
    box-shadow:0 0 10px rgba(61,186,112,.55);
  }
  .progress-label{
    color:var(--blue-dark);font-weight:700;font-size:16px;
    background:rgba(255,255,255,.75);padding:3px 12px;border-radius:20px;white-space:nowrap;
  }
  .timer-chip{
    display:flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.75);border-radius:20px;
    padding:4px 14px;color:var(--blue-dark);font-weight:700;font-size:16px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
  }
  .timer-chip svg{width:16px;height:16px;}

  /* ════════════ TELA DE PERGUNTA ════════════ */
  .q-main{display:flex;gap:28px;margin-top:10px;}
  .q-left{flex:1;display:flex;flex-direction:column;}
  .q-text{
    color:var(--blue-dark);font-size:27px;font-weight:700;
    line-height:1.26;text-transform:uppercase;margin-bottom:16px;
    background:rgba(255,255,255,.62);backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px);
    border-radius:16px;padding:13px 18px;
    border-left:5px solid var(--blue);
    box-shadow:0 2px 10px rgba(26,136,208,.08);
  }
  .q-pic{
    width:188px;height:188px;flex-shrink:0;
    background:rgba(255,255,255,.92);
    border:4px solid rgba(255,255,255,1);
    border-radius:22px;
    display:flex;align-items:center;justify-content:center;padding:14px;
    box-shadow:0 8px 26px rgba(26,136,208,.22),0 2px 6px rgba(0,0,0,.1);
  }
  .q-pic svg{width:100%;height:100%;}

  /* ── Opções com letras A B C ── */
  .options{display:flex;flex-direction:column;gap:9px;counter-reset:letra;}
  .option{
    display:flex;align-items:center;gap:14px;padding:11px 16px;cursor:pointer;
    border-radius:14px;background:rgba(255,255,255,.78);
    border:3px solid transparent;
    box-shadow:0 3px 8px rgba(26,136,208,.09);
    transition:all .18s ease;counter-increment:letra;
  }
  .option:hover{
    border-color:var(--blue);background:rgba(255,255,255,.97);
    transform:translateX(6px);
    box-shadow:0 5px 16px rgba(26,136,208,.24);
  }
  .bullet{
    width:38px;height:38px;flex-shrink:0;border-radius:50%;
    background:var(--gray);border:3px solid #c2c8cc;
    display:flex;align-items:center;justify-content:center;
    transition:all .18s;
  }
  .bullet::before{
    content:counter(letra,upper-alpha);
    color:#6b7880;font-weight:700;font-size:15px;font-family:'Fredoka',sans-serif;
  }
  .option.selected .bullet{background:var(--blue);border-color:var(--blue-dark);box-shadow:0 0 0 4px rgba(26,136,208,.25);}
  .option.selected .bullet::before{color:#fff;}
  .option.correct  .bullet{background:var(--green);border-color:var(--green-dark);}
  .option.correct  .bullet::before{color:#fff;}
  .option.wrong    .bullet{background:var(--red);border-color:var(--red-dark);}
  .option.wrong    .bullet::before{color:#fff;}
  .option-text{
    color:var(--gray-text);font-size:21px;font-weight:500;
    text-transform:uppercase;line-height:1.2;
  }
  .option.selected .option-text{color:var(--blue-dark);font-weight:600;}
  .option.correct{background:rgba(61,186,112,.12);border-color:var(--green);}
  .option.correct .option-text{color:var(--green-dark);font-weight:600;}
  .option.wrong{background:rgba(240,90,64,.1);border-color:var(--red);}
  .option.wrong .option-text{color:var(--red-dark);}
  .shake{animation:shake .45s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}
  }

  /* ════════════ TELA DE FEEDBACK ════════════ */
  .feedback{flex-direction:row;align-items:center;gap:26px;padding-bottom:144px;}
  .fb-char{width:280px;flex-shrink:0;display:flex;justify-content:center;}
  .fb-char svg{width:240px;height:auto;filter:drop-shadow(0 14px 18px rgba(26,136,208,.2));}
  .fb-panel{flex:1;display:flex;flex-direction:column;gap:12px;}
  .fb-badge{
    display:inline-flex;align-items:center;gap:8px;
    padding:7px 22px;border-radius:30px;font-size:17px;font-weight:700;
    text-transform:uppercase;letter-spacing:.5px;align-self:flex-start;
  }
  .fb-badge.good{background:rgba(61,186,112,.2);color:var(--green-dark);border:2px solid rgba(61,186,112,.4);}
  .fb-badge.bad {background:rgba(240,90,64,.16);color:var(--red-dark);  border:2px solid rgba(240,90,64,.35);}
  .fb-text{
    color:var(--blue-dark);font-size:26px;font-weight:600;line-height:1.28;
    text-transform:uppercase;
    background:rgba(255,255,255,.68);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    border-radius:16px;padding:16px 20px;
    border-left:5px solid var(--green);
    box-shadow:0 3px 12px rgba(26,136,208,.1);
  }
  .fb-text.bad{color:var(--red-dark);border-left-color:var(--red);}

  /* ════════════ TELA FINAL ════════════ */
  #end{align-items:center;justify-content:center;text-align:center;padding-bottom:152px;gap:6px;}
  #end h1{
    font-size:50px;font-weight:700;text-transform:uppercase;
    background:linear-gradient(135deg,#1460a0,#1a88d0,#00b8a6);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 2px 0 rgba(255,255,255,.75));
  }
  .score-badge{
    margin:12px 0 4px;
    background:rgba(255,255,255,.9);
    border:4px solid var(--blue-dark);border-radius:26px;
    padding:18px 54px;
    box-shadow:0 10px 28px rgba(26,136,208,.22),0 2px 6px rgba(0,0,0,.08);
  }
  .score-badge .num{
    color:var(--green);font-size:72px;font-weight:700;line-height:1;
    text-shadow:0 4px 0 var(--green-dark);
  }
  .score-badge .lbl{
    color:var(--gray-text);font-size:17px;font-weight:500;
    text-transform:uppercase;letter-spacing:1px;
  }
  .stat-line{
    color:var(--blue-dark);font-size:21px;font-weight:600;
    background:rgba(255,255,255,.6);padding:5px 22px;border-radius:20px;
  }
  #end p{
    color:var(--gray-text);font-size:20px;
    background:rgba(255,255,255,.5);padding:5px 18px;border-radius:12px;
  }

  /* ════════════ TELA DE HISTÓRICO ════════════ */
  #history{padding-bottom:150px;}
  #history h1{
    font-size:40px;font-weight:700;text-transform:uppercase;text-align:center;
    background:linear-gradient(135deg,#1460a0,#1a88d0);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 2px 0 rgba(255,255,255,.75));margin-bottom:4px;
  }
  .hist-sub{
    text-align:center;color:var(--gray-text);font-size:16px;margin-bottom:12px;
    background:rgba(255,255,255,.52);padding:4px 20px;border-radius:20px;
    align-self:center;
  }
  .hist-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px;}
  .hist-row{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,.8);border-radius:16px;
    padding:12px 18px;border:2px solid transparent;
    box-shadow:0 3px 10px rgba(26,136,208,.1);transition:border-color .15s,box-shadow .15s;
  }
  .hist-row:hover{border-color:rgba(26,136,208,.3);box-shadow:0 5px 16px rgba(26,136,208,.18);}
  .hist-rank{
    width:36px;height:36px;flex-shrink:0;
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:#fff;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;box-shadow:0 3px 8px rgba(26,136,208,.32);
  }
  .hist-row.best .hist-rank{
    background:linear-gradient(135deg,#f7cc48,#e8a000);
    box-shadow:0 3px 8px rgba(245,165,0,.42);
  }
  .hist-info{flex:1;}
  .hist-date{color:var(--gray-text);font-size:14px;}
  .hist-main{color:var(--blue-dark);font-size:19px;font-weight:600;}
  .hist-trend{font-size:15px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:5px;}
  .trend-up{color:var(--green);}
  .trend-down{color:var(--red);}
  .trend-same{color:var(--gray-text);}
  .hist-empty{text-align:center;color:var(--gray-text);font-size:20px;margin-top:60px;}
  .hist-actions{display:flex;justify-content:center;gap:14px;margin-top:10px;}

  @media(max-width:680px){
    .stage{height:96vh;}
    .screen{padding:20px 20px 0;}
    .q-text{font-size:22px;padding:10px 14px;}
    .q-pic{width:118px;height:118px;}
    .option-text{font-size:17px;}
    #start h1{font-size:38px;}
    .feedback{flex-direction:column;gap:12px;}
    .fb-char svg{width:130px;}
    .fb-text{font-size:20px;padding:12px 16px;}
    .q-main{gap:14px;}
  }
</style>
</head>
<body>
<div class="stage" id="stage">

  <!-- bolhas decorativas -->
  <div class="bbl" style="width:58px;height:58px;left:4%;bottom:-70px;animation-duration:9s;animation-delay:-1s;"></div>
  <div class="bbl" style="width:30px;height:30px;left:16%;bottom:-42px;animation-duration:7s;animation-delay:-4.5s;"></div>
  <div class="bbl" style="width:16px;height:16px;left:29%;bottom:-28px;animation-duration:5.5s;animation-delay:-2s;"></div>
  <div class="bbl" style="width:46px;height:46px;left:42%;bottom:-58px;animation-duration:11s;animation-delay:-7s;"></div>
  <div class="bbl" style="width:22px;height:22px;left:57%;bottom:-34px;animation-duration:8s;animation-delay:-3s;"></div>
  <div class="bbl" style="width:40px;height:40px;left:69%;bottom:-52px;animation-duration:10s;animation-delay:-5.5s;"></div>
  <div class="bbl" style="width:12px;height:12px;left:80%;bottom:-22px;animation-duration:6s;animation-delay:-1.5s;"></div>
  <div class="bbl" style="width:52px;height:52px;left:88%;bottom:-65px;animation-duration:12s;animation-delay:-8.5s;"></div>
  <div class="bbl" style="width:20px;height:20px;left:73%;bottom:-32px;animation-duration:7.5s;animation-delay:-3.8s;"></div>

  <!-- ====== TELA INICIAL ====== -->
  <section class="screen active" id="start">
    <div class="hero">
      <!-- sabonete com bolhas -->
      <svg width="200" height="180" viewBox="0 0 200 180">
        <ellipse cx="100" cy="162" rx="72" ry="13" fill="#1460a0" opacity=".12"/>
        <!-- sombra sob sabonete -->
        <ellipse cx="100" cy="148" rx="52" ry="9" fill="#1460a0" opacity=".1"/>
        <!-- sabonete corpo -->
        <rect x="38" y="84" width="126" height="64" rx="24" fill="#7ec8ec"/>
        <rect x="38" y="74" width="126" height="64" rx="24" fill="#a8dbf3"/>
        <!-- brilho -->
        <ellipse cx="74" cy="90" rx="26" ry="15" fill="#fff" opacity=".5"/>
        <ellipse cx="62" cy="84" rx="10" ry="7" fill="#fff" opacity=".35"/>
        <!-- bolhas -->
        <circle cx="58"  cy="46" r="18" fill="#fff" opacity=".92"/>
        <circle cx="96"  cy="28" r="25" fill="#fff" opacity=".96"/>
        <circle cx="136" cy="50" r="15" fill="#fff" opacity=".9"/>
        <circle cx="122" cy="65" r="10" fill="#fff" opacity=".82"/>
        <circle cx="78"  cy="26"  r="7" fill="#bfe6f7"/>
        <circle cx="55"  cy="44"  r="5" fill="#bfe6f7"/>
        <circle cx="96"  cy="14"  r="4" fill="#d4effa"/>
        <circle cx="138" cy="48"  r="4" fill="#d4effa"/>
        <!-- reflexo bolha grande -->
        <circle cx="88"  cy="22"  r="6" fill="#fff" opacity=".6"/>
      </svg>
    </div>
    <h1>Jogo da Higiene</h1>
    <div class="start-card">
      <p>Responda as perguntas e aprenda como cuidar do corpo e ficar sempre saudável!</p>
    </div>
    <button class="btn-ghost" id="historyBtn">Ver resultados</button>
    <div class="btn-wrap">
      <button class="btn" id="startBtn">Começar</button>
    </div>
  </section>

  <!-- ====== TELA DE PERGUNTA ====== -->
  <section class="screen" id="quiz">
    <div class="topbar">
      <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
      <div class="timer-chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6"/></svg>
        <span id="timer">00:00</span>
      </div>
      <div class="progress-label" id="counter">1 / 10</div>
    </div>
    <div class="q-main">
      <div class="q-left">
        <div class="q-text" id="qText">Pergunta</div>
        <div class="options" id="options"></div>
      </div>
      <div class="q-pic" id="qPic"></div>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="confirmBtn" disabled>Confirmar</button>
    </div>
  </section>

  <!-- ====== TELA DE FEEDBACK ====== -->
  <section class="screen" id="feedback">
    <div class="feedback">
      <div class="fb-char" id="fbChar"></div>
      <div class="fb-panel">
        <div class="fb-badge good" id="fbBadge">✓ Correto!</div>
        <div class="fb-text" id="fbText"></div>
      </div>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="continueBtn">Continuar</button>
    </div>
  </section>

  <!-- ====== TELA FINAL ====== -->
  <section class="screen" id="end">
    <h1 id="endTitle">Parabéns!</h1>
    <div class="score-badge">
      <div class="num" id="finalScore">0</div>
      <div class="lbl">acertos de 10</div>
    </div>
    <div class="stat-line">⏱ Tempo: <strong id="finalTime">00:00</strong></div>
    <p id="endMsg">Você é craque na higiene!</p>
    <div class="btn-wrap" style="gap:14px;align-items:center;">
      <button class="btn-ghost" id="endHomeBtn">Início</button>
      <button class="btn" id="restartBtn">Jogar de novo</button>
    </div>
  </section>

  <!-- ====== TELA DE HISTÓRICO ====== -->
  <section class="screen" id="history">
    <h1>Resultados</h1>
    <div class="hist-sub" id="histSub">Compare suas partidas e veja sua evolução</div>
    <div class="hist-list" id="histList"></div>
    <div class="hist-actions">
      <button class="btn-ghost" id="clearHistBtn">Limpar histórico</button>
      <button class="btn-ghost" id="backHistBtn">Voltar</button>
    </div>
  </section>

  <div class="footer"></div>

/* ================= EFEITOS SONOROS (Web Audio API) ================= */
let actx;
function audio(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(freq,start,dur,type='sine',vol=.25){
  const a=audio();
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(a.destination);
  const t=a.currentTime+start;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.03);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.start(t); o.stop(t+dur+.05);
}
const sfx={
  click(){ tone(420,0,.09,'triangle',.18); },
  correct(){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.1,.32,'triangle',.22)); },
  wrong(){ tone(220,0,.22,'sawtooth',.18); tone(160,.12,.3,'sawtooth',.18); },
  win(){ [523,587,659,784,880,1047].forEach((f,i)=>tone(f,i*.13,.5,'triangle',.22)); }
};

/* ================= LÓGICA DO JOGO ================= */
const screens = {
  start:document.getElementById('start'),
  quiz:document.getElementById('quiz'),
  feedback:document.getElementById('feedback'),
  end:document.getElementById('end'),
  history:document.getElementById('history')
};
function show(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
}

let current=0, score=0, selected=null, locked=false;
let deck=[];               // perguntas embaralhadas da partida
let elapsed=0, timerId=null, startTime=0;

/* ---- embaralhar (Fisher-Yates) ---- */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ---- cronômetro ---- */
function fmtTime(s){
  const m=Math.floor(s/60), r=s%60;
  return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');
}
function startTimer(){
  elapsed=0; startTime=Date.now();
  document.getElementById('timer').textContent='00:00';
  clearInterval(timerId);
  timerId=setInterval(()=>{
    elapsed=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('timer').textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){ clearInterval(timerId); }

/* ---- início de partida ---- */
function newGame(){
  current=0; score=0;
  deck=shuffle(QUESTIONS);
  startTimer();
  loadQuestion();
  show('quiz');
}

function loadQuestion(){
  const q=deck[current];
  selected=null; locked=false;
  document.getElementById('confirmBtn').disabled=true;
  document.getElementById('qPic').innerHTML=PIC[q.pic];
  document.getElementById('qText').textContent=q.q;
  document.getElementById('counter').textContent=(current+1)+' / '+deck.length;
  document.getElementById('progress').style.width=(current/deck.length*100)+'%';

  const box=document.getElementById('options');
  box.innerHTML='';
  q.options.forEach((text,i)=>{
    const el=document.createElement('div');
    el.className='option';
    el.innerHTML='<div class="bullet"></div><div class="option-text">'+text+'</div>';
    el.onclick=()=>{
      if(locked) return;
      sfx.click();
      [...box.children].forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      selected=i;
      document.getElementById('confirmBtn').disabled=false;
    };
    box.appendChild(el);
  });
}

function confirmAnswer(){
  if(locked||selected===null) return;
  locked=true;
  const q=deck[current];
  const opts=document.getElementById('options').children;
  document.getElementById('confirmBtn').disabled=true;

  if(selected===q.answer){
    opts[selected].classList.add('correct');
    score++;
    sfx.correct();
    setTimeout(()=>showFeedback(true,q.good),700);
  }else{
    opts[selected].classList.add('wrong');
    opts[q.answer].classList.add('correct');
    sfx.wrong();
    document.querySelector('.q-main').classList.add('shake');
    setTimeout(()=>document.querySelector('.q-main').classList.remove('shake'),420);
    const correctText=q.options[q.answer].toLowerCase();
    setTimeout(()=>showFeedback(false,
      'Ops! Não foi dessa vez. A resposta certa é: '+correctText+' Continue tentando!'),900);
  }
}

function showFeedback(good,text){
  document.getElementById('fbChar').innerHTML=charSVG(good);
  const ft=document.getElementById('fbText');
  ft.textContent=text;
  ft.classList.toggle('bad',!good);
  const badge=document.getElementById('fbBadge');
  badge.textContent=good?'✓ Correto!':'✗ Ops!';
  badge.className='fb-badge '+(good?'good':'bad');
  show('feedback');
}

function nextStep(){
  sfx.click();
  current++;
  if(current>=deck.length){
    finish();
  }else{
    loadQuestion();
    show('quiz');
  }
}

function finish(){
  stopTimer();
  const total=deck.length;
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalTime').textContent=fmtTime(elapsed);
  let title,msg;
  if(score===total){ title='Incrível!'; msg='Você é um verdadeiro mestre da higiene!'; }
  else if(score>=total*0.7){ title='Muito bem!'; msg='Você sabe cuidar muito bem do seu corpo!'; }
  else if(score>=total*0.4){ title='Bom trabalho!'; msg='Continue praticando os hábitos de higiene!'; }
  else { title='Continue assim!'; msg='Vamos jogar de novo e aprender mais sobre higiene!'; }
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endMsg').textContent=msg;
  saveResult(score,total,elapsed);
  sfx.win();
  show('end');
}

/* ================= HISTÓRICO DE PARTIDAS ================= */
const HKEY='higienegame_historico';

function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(HKEY))||[]; }
  catch(e){ return []; }
}
function saveResult(score,total,time){
  try{
    const h=loadHistory();
    h.push({score,total,time,date:Date.now()});
    localStorage.setItem(HKEY,JSON.stringify(h.slice(-30)));
  }catch(e){/* armazenamento indisponível */}
}

function renderHistory(){
  const list=document.getElementById('histList');
  const sub=document.getElementById('histSub');
  const h=loadHistory();
  list.innerHTML='';

  if(h.length===0){
    sub.textContent='Compare suas partidas e veja sua evolução';
    list.innerHTML='<div class="hist-empty">Nenhuma partida registrada ainda.<br>Jogue para começar a comparar!</div>';
    return;
  }

  const bestScore=Math.max(...h.map(g=>g.score));
  const last=h[h.length-1];
  const first=h[0];
  if(h.length>=2){
    const diff=last.score-first.score;
    if(diff>0) sub.textContent='Você melhorou '+diff+' acerto(s) desde a primeira partida! 🎉';
    else if(diff<0) sub.textContent='Atenção: caiu '+Math.abs(diff)+' acerto(s) desde a primeira partida.';
    else sub.textContent='Seu desempenho está estável. Tente superar seu recorde!';
  }else{
    sub.textContent='Jogue mais uma vez para comparar a evolução.';
  }

  // mais recentes no topo
  [...h].reverse().forEach((g,idx)=>{
    const realIndex=h.length-idx;          // nº da partida (1 = primeira)
    const prev=h[h.length-idx-2];          // partida anterior
    const row=document.createElement('div');
    row.className='hist-row'+(g.score===bestScore?' best':'');

    let trend='<span class="trend-same">—</span>';
    if(prev){
      const d=g.score-prev.score;
      if(d>0) trend='<span class="hist-trend trend-up">▲ +'+d+'</span>';
      else if(d<0) trend='<span class="hist-trend trend-down">▼ '+d+'</span>';
      else trend='<span class="hist-trend trend-same">= igual</span>';
    }

    const dt=new Date(g.date);
    const dataStr=String(dt.getDate()).padStart(2,'0')+'/'+
                  String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear()+
                  ' às '+String(dt.getHours()).padStart(2,'0')+':'+
                  String(dt.getMinutes()).padStart(2,'0');

    row.innerHTML=
      '<div class="hist-rank">'+realIndex+'</div>'+
      '<div class="hist-info">'+
        '<div class="hist-main">'+g.score+'/'+g.total+' acertos · ⏱ '+fmtTime(g.time)+
        (g.score===bestScore?'  🏆':'')+'</div>'+
        '<div class="hist-date">Partida '+realIndex+' — '+dataStr+'</div>'+
      '</div>'+
      trend;
    list.appendChild(row);
  });
}
