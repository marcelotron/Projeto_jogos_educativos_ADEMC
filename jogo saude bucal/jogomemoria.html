<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     PALETA E VARIÁVEIS
     ========================================================= */
  :root {
    --cor-fundo: #FFF5E4;
    --cor-fundo-2: #FFE4C9;
    --cor-primaria: #FF7F6B;
    --cor-primaria-escura: #E85A45;
    --cor-secundaria: #2D3047;
    --cor-mint: #7FC8A9;
    --cor-amarelo: #FFD166;
    --cor-creme: #FFFAF0;
    --sombra-card: 0 6px 0 rgba(45, 48, 71, 0.15), 0 8px 20px rgba(45, 48, 71, 0.12);
    --sombra-card-hover: 0 8px 0 rgba(45, 48, 71, 0.2), 0 12px 24px rgba(45, 48, 71, 0.18);
    --raio: 18px;
    --transicao: 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background:
      radial-gradient(circle at 10% 20%, var(--cor-fundo-2) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #FFE5D9 0%, transparent 40%),
      var(--cor-fundo);
    color: var(--cor-secundaria);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* =========================================================
     CABEÇALHO E HUD
     ========================================================= */
  .topo {
    max-width: 720px;
    margin: 0 auto 16px;
    width: 100%;
    text-align: center;
  }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    color: var(--cor-secundaria);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  h1 .destaque {
    color: var(--cor-primaria);
    display: inline-block;
    transform: rotate(-3deg);
  }

  .nivel-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--cor-secundaria);
    color: var(--cor-creme);
    padding: 6px 16px;
    border-radius: 999px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    margin-top: 6px;
    box-shadow: 0 4px 0 rgba(45, 48, 71, 0.15);
  }

  .nivel-pill .bolinha {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--cor-amarelo);
    box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.3);
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--cor-creme);
    border: 3px solid var(--cor-secundaria);
    border-radius: var(--raio);
    padding: 8px 16px;
    box-shadow: 0 4px 0 var(--cor-secundaria);
    min-width: 90px;
  }

  .stat .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    opacity: 0.6;
  }

  .stat .valor {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--cor-secundaria);
    line-height: 1.1;
  }

  .stat.destaque .valor { color: var(--cor-primaria); }

  /* =========================================================
     TABULEIRO
     ========================================================= */
  .tabuleiro-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .tabuleiro {
    display: grid;
    grid-template-columns: repeat(var(--cols, 4), 1fr);
    gap: clamp(8px, 1.5vw, 14px);
    width: 100%;
    max-width: 640px;
    padding: 4px;
  }

  /* =========================================================
     CARTA
     ========================================================= */
  .carta {
    aspect-ratio: 3 / 4;
    perspective: 1000px;
    cursor: pointer;
    position: relative;
  }

  .carta-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .carta.virada .carta-inner {
    transform: rotateY(180deg);
  }

  .carta-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--raio);
    overflow: hidden;
    box-shadow: var(--sombra-card);
    transition: box-shadow var(--transicao);
  }

  .carta:not(.combinada):not(.virada) {
    transition: transform 0.2s ease;
  }

  .carta:not(.combinada):not(.virada):hover {
    transform: translateY(-3px);
  }

  .carta:not(.combinada):not(.virada):hover .carta-verso {
    box-shadow: var(--sombra-card-hover);
  }

  /* Verso (lado fechado) - padrão CSS, sem imagem necessária */
  .carta-verso {
    background:
      repeating-linear-gradient(
        45deg,
        var(--cor-primaria) 0,
        var(--cor-primaria) 10px,
        var(--cor-primaria-escura) 10px,
        var(--cor-primaria-escura) 20px
      );
    border: 4px solid var(--cor-secundaria);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .carta-verso::before {
    content: '?';
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--cor-creme);
    background: var(--cor-secundaria);
    width: 55%;
    height: 55%;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
    text-shadow: 0 2px 0 rgba(0,0,0,0.2);
  }

  /* Frente (lado aberto) - sua imagem */
  .carta-frente {
    transform: rotateY(180deg);
    background: var(--cor-creme);
    border: 4px solid var(--cor-secundaria);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6%;
  }

  .carta-frente img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  /* Estado: combinou */
  .carta.combinada {
    cursor: default;
    animation: combinou 0.6s ease;
  }

  .carta.combinada .carta-frente {
    border-color: var(--cor-mint);
    background: #EAFBF1;
    box-shadow:
      0 0 0 4px var(--cor-mint),
      0 6px 0 rgba(45, 48, 71, 0.15),
      0 8px 20px rgba(127, 200, 169, 0.4);
  }

  @keyframes combinou {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.08) rotate(-2deg); }
    70%  { transform: scale(0.96) rotate(1deg); }
    100% { transform: scale(1); }
  }

  /* Estado: errou (chacoalha) */
  .carta.errou .carta-inner {
    animation: chacoalha 0.45s ease;
  }

  @keyframes chacoalha {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25%      { transform: rotateY(180deg) translateX(-6px); }
    50%      { transform: rotateY(180deg) translateX(6px); }
    75%      { transform: rotateY(180deg) translateX(-3px); }
  }

  /* Travado durante checagem */
  .tabuleiro.travado .carta:not(.virada):not(.combinada) {
    pointer-events: none;
  }

  /* =========================================================
     BOTÕES
     ========================================================= */
  .acoes {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .botao {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    padding: 12px 22px;
    border-radius: var(--raio);
    border: 3px solid var(--cor-secundaria);
    background: var(--cor-creme);
    color: var(--cor-secundaria);
    cursor: pointer;
    box-shadow: 0 5px 0 var(--cor-secundaria);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .botao:hover { transform: translateY(-1px); box-shadow: 0 6px 0 var(--cor-secundaria); }
  .botao:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--cor-secundaria); }

  .botao.primario {
    background: var(--cor-primaria);
    color: white;
  }

  /* =========================================================
     MODAL DE VITÓRIA
     ========================================================= */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(45, 48, 71, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    backdrop-filter: blur(4px);
  }

  .overlay.visivel {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    background: var(--cor-creme);
    border: 4px solid var(--cor-secundaria);
    border-radius: 28px;
    padding: 32px 28px;
    box-shadow: 0 10px 0 var(--cor-secundaria);
    text-align: center;
    max-width: 360px;
    width: calc(100% - 32px);
    transform: scale(0.7) rotate(-3deg);
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .overlay.visivel .modal {
    transform: scale(1) rotate(0);
  }

  .modal h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2rem;
    color: var(--cor-primaria);
    margin-bottom: 8px;
  }

  .modal .emoji {
    font-size: 3.5rem;
    display: block;
    margin-bottom: 8px;
    animation: pulo 0.6s ease;
  }

  @keyframes pulo {
    0%   { transform: scale(0) rotate(-180deg); }
    60%  { transform: scale(1.2) rotate(20deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .modal p {
    font-size: 1.05rem;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .modal .resumo {
    background: var(--cor-fundo-2);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-around;
  }

  .modal .resumo div {
    font-family: 'Fredoka', sans-serif;
  }

  .modal .resumo .num {
    font-size: 1.6rem;
    color: var(--cor-primaria);
    display: block;
  }

  .modal .resumo .lbl {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.7;
  }

  /* =========================================================
     CONFETE
     ========================================================= */
  .confete {
    position: fixed;
    width: 10px;
    height: 14px;
    top: -20px;
    z-index: 99;
    pointer-events: none;
    animation: cair linear forwards;
  }

  @keyframes cair {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* =========================================================
     RESPONSIVO
     ========================================================= */
  @media (max-width: 480px) {
    body { padding: 10px; }
    .stat { padding: 6px 12px; min-width: 75px; }
    .stat .valor { font-size: 1.2rem; }
    .botao { padding: 10px 18px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

  <header class="topo">
    <h1>Jogo da <span class="destaque">Memória</span></h1>
    <div class="nivel-pill">
      <span class="bolinha"></span>
      <span id="nomeNivel">Nível 1 — Fácil</span>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="label">Jogadas</div>
        <div class="valor" id="statJogadas">0</div>
      </div>
      <div class="stat destaque">
        <div class="label">Pares</div>
        <div class="valor"><span id="statPares">0</span>/<span id="statTotal">6</span></div>
      </div>
      <div class="stat">
        <div class="label">Tempo</div>
        <div class="valor" id="statTempo">0:00</div>
      </div>
    </div>
  </header>

  <main class="tabuleiro-wrap">
    <div class="tabuleiro" id="tabuleiro"></div>
  </main>

  <div class="acoes">
    <button class="botao" id="btnReiniciar">↻ Reiniciar</button>
    <button class="botao primario" id="btnTrocarNivel">Trocar Nível</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <span class="emoji" id="modalEmoji">🎉</span>
      <h2 id="modalTitulo">Mandou bem!</h2>
      <p id="modalTexto">Você completou esse nível.</p>
      <div class="resumo">
        <div>
          <span class="num" id="modalJogadas">0</span>
          <span class="lbl">Jogadas</span>
        </div>
        <div>
          <span class="num" id="modalTempo">0:00</span>
          <span class="lbl">Tempo</span>
        </div>
      </div>
      <button class="botao primario" id="btnProximo">Próximo Nível →</button>
    </div>
  </div>

<script>
/* =========================================================
   CONFIGURAÇÃO — edite aqui pra ajustar o jogo
   ========================================================= */
const CONFIG = {
  // Pasta onde estão suas imagens das cartas
  pasta: './cartas/',
  // Extensão dos arquivos (.png, .jpg, .webp, etc.)
  extensao: '.png',

  // Os 3 níveis: você precisa ter pelo menos 10 imagens
  // nomeadas 1.png, 2.png, ... 10.png dentro de ./cartas/
  niveis: [
    { nome: 'Fácil',   pares: 6,  colunas: 4 },  // 12 cartas (4×3)
    { nome: 'Médio',   pares: 8,  colunas: 4 },  // 16 cartas (4×4)
    { nome: 'Difícil', pares: 10, colunas: 5 }   // 20 cartas (5×4)
  ]
};

/* =========================================================
   ESTADO
   ========================================================= */
const estado = {
  nivelAtual: 0,
  cartas: [],          // {id, valor, elemento, virada, combinada}
  primeiraCarta: null,
  segundaCarta: null,
  travado: false,
  jogadas: 0,
  paresEncontrados: 0,
  tempoInicio: null,
  intervaloTempo: null
};

/* =========================================================
   ÁUDIO — Web Audio API (sem arquivos externos)
   ========================================================= */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // Safari/iOS exige resume após interação
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tocarTom(freq, duracao, tipo = 'sine', volume = 0.15, ataque = 0.005) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = tipo;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + ataque);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duracao);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duracao);
}

function somVirar() {
  tocarTom(420, 0.08, 'square', 0.08);
}

function somCombinou() {
  // Acorde ascendente bem rápido
  tocarTom(523.25, 0.18, 'sine', 0.15);                            // C5
  setTimeout(() => tocarTom(659.25, 0.18, 'sine', 0.15), 80);      // E5
  setTimeout(() => tocarTom(783.99, 0.30, 'sine', 0.15), 160);     // G5
}

function somErrou() {
  tocarTom(180, 0.15, 'sawtooth', 0.10);
  setTimeout(() => tocarTom(140, 0.20, 'sawtooth', 0.10), 90);
}

function somVitoria() {
  const notas = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
  notas.forEach((f, i) => {
    setTimeout(() => tocarTom(f, 0.25, 'triangle', 0.18), i * 100);
  });
  setTimeout(() => {
    tocarTom(1046.50, 0.5, 'sine', 0.15);
    tocarTom(1318.51, 0.5, 'sine', 0.10);
  }, 500);
}

/* =========================================================
   UTILS
   ========================================================= */
function embaralhar(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function formatarTempo(ms) {
  const total = Math.floor(ms / 1000);
  const min = Math.floor(total / 60);
  const seg = total % 60;
  return `${min}:${String(seg).padStart(2, '0')}`;
}

/* =========================================================
   MONTAGEM DO TABULEIRO
   ========================================================= */
function montarNivel(indice) {
  const nivel = CONFIG.niveis[indice];
  const tabuleiro = document.getElementById('tabuleiro');

  // reset estado
  estado.nivelAtual = indice;
  estado.cartas = [];
  estado.primeiraCarta = null;
  estado.segundaCarta = null;
  estado.travado = false;
  estado.jogadas = 0;
  estado.paresEncontrados = 0;
  estado.tempoInicio = null;
  if (estado.intervaloTempo) clearInterval(estado.intervaloTempo);

  // HUD
  document.getElementById('nomeNivel').textContent = `Nível ${indice + 1} — ${nivel.nome}`;
  document.getElementById('statJogadas').textContent = '0';
  document.getElementById('statPares').textContent = '0';
  document.getElementById('statTotal').textContent = nivel.pares;
  document.getElementById('statTempo').textContent = '0:00';

  // grid colunas
  tabuleiro.style.setProperty('--cols', nivel.colunas);
  tabuleiro.classList.remove('travado');
  tabuleiro.innerHTML = '';

  // gerar pares: usa imagens 1..N onde N = nivel.pares
  const valores = [];
  for (let i = 1; i <= nivel.pares; i++) {
    valores.push(i, i); // duas de cada
  }
  const embaralhadas = embaralhar(valores);

  // criar cartas
  embaralhadas.forEach((valor, idx) => {
    const carta = document.createElement('div');
    carta.className = 'carta';
    carta.dataset.valor = valor;

    const inner = document.createElement('div');
    inner.className = 'carta-inner';

    const verso = document.createElement('div');
    verso.className = 'carta-face carta-verso';

    const frente = document.createElement('div');
    frente.className = 'carta-face carta-frente';
    const img = document.createElement('img');
    img.src = `${CONFIG.pasta}${valor}${CONFIG.extensao}`;
    img.alt = `Carta ${valor}`;
    img.onerror = () => {
      // fallback se a imagem não carregar
      frente.innerHTML = `<span style="font-family:Fredoka,sans-serif;font-size:2.5rem;font-weight:700;color:var(--cor-primaria)">${valor}</span>`;
    };
    frente.appendChild(img);

    inner.appendChild(verso);
    inner.appendChild(frente);
    carta.appendChild(inner);

    carta.addEventListener('click', () => clicarCarta(carta, valor));

    tabuleiro.appendChild(carta);
    estado.cartas.push({ elemento: carta, valor, virada: false, combinada: false });
  });
}

/* =========================================================
   LÓGICA DE JOGO
   ========================================================= */
function clicarCarta(elemento, valor) {
  if (estado.travado) return;
  if (elemento.classList.contains('virada')) return;
  if (elemento.classList.contains('combinada')) return;

  // primeira interação inicia o cronômetro
  if (estado.tempoInicio === null) iniciarCronometro();

  somVirar();
  elemento.classList.add('virada');

  if (!estado.primeiraCarta) {
    estado.primeiraCarta = { elemento, valor };
    return;
  }

  estado.segundaCarta = { elemento, valor };
  estado.jogadas++;
  document.getElementById('statJogadas').textContent = estado.jogadas;
  estado.travado = true;
  document.getElementById('tabuleiro').classList.add('travado');

  if (estado.primeiraCarta.valor === estado.segundaCarta.valor) {
    // combinou
    setTimeout(() => {
      estado.primeiraCarta.elemento.classList.add('combinada');
      estado.segundaCarta.elemento.classList.add('combinada');
      somCombinou();
      estado.paresEncontrados++;
      document.getElementById('statPares').textContent = estado.paresEncontrados;
      resetarTurno();

      if (estado.paresEncontrados === CONFIG.niveis[estado.nivelAtual].pares) {
        setTimeout(vencerNivel, 600);
      }
    }, 300);
  } else {
    // errou
    setTimeout(() => {
      estado.primeiraCarta.elemento.classList.add('errou');
      estado.segundaCarta.elemento.classList.add('errou');
      somErrou();
    }, 350);
    setTimeout(() => {
      estado.primeiraCarta.elemento.classList.remove('virada', 'errou');
      estado.segundaCarta.elemento.classList.remove('virada', 'errou');
      resetarTurno();
    }, 1100);
  }
}

function resetarTurno() {
  estado.primeiraCarta = null;
  estado.segundaCarta = null;
  estado.travado = false;
  document.getElementById('tabuleiro').classList.remove('travado');
}

/* =========================================================
   CRONÔMETRO
   ========================================================= */
function iniciarCronometro() {
  estado.tempoInicio = Date.now();
  estado.intervaloTempo = setInterval(() => {
    document.getElementById('statTempo').textContent =
      formatarTempo(Date.now() - estado.tempoInicio);
  }, 500);
}

/* =========================================================
   VITÓRIA
   ========================================================= */
function vencerNivel() {
  clearInterval(estado.intervaloTempo);
  somVitoria();
  lancarConfete();

  const ehUltimo = estado.nivelAtual === CONFIG.niveis.length - 1;
  const tempo = estado.tempoInicio ? Date.now() - estado.tempoInicio : 0;

  document.getElementById('modalEmoji').textContent = ehUltimo ? '🏆' : '🎉';
  document.getElementById('modalTitulo').textContent =
    ehUltimo ? 'Campeão!' : 'Mandou bem!';
  document.getElementById('modalTexto').textContent =
    ehUltimo
      ? 'Você zerou todos os níveis!'
      : `Pronto pro nível ${estado.nivelAtual + 2}?`;
  document.getElementById('modalJogadas').textContent = estado.jogadas;
  document.getElementById('modalTempo').textContent = formatarTempo(tempo);
  document.getElementById('btnProximo').textContent =
    ehUltimo ? 'Jogar de novo' : 'Próximo Nível →';

  document.getElementById('overlay').classList.add('visivel');
}

function lancarConfete() {
  const cores = ['#FF7F6B', '#FFD166', '#7FC8A9', '#2D3047', '#E85A45'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confete';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = cores[Math.floor(Math.random() * cores.length)];
    c.style.animationDuration = (1.8 + Math.random() * 1.5) + 's';
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

/* =========================================================
   BOTÕES
   ========================================================= */
document.getElementById('btnReiniciar').addEventListener('click', () => {
  montarNivel(estado.nivelAtual);
});

document.getElementById('btnTrocarNivel').addEventListener('click', () => {
  const proximo = (estado.nivelAtual + 1) % CONFIG.niveis.length;
  montarNivel(proximo);
});

document.getElementById('btnProximo').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('visivel');
  const proximo = (estado.nivelAtual + 1) % CONFIG.niveis.length;
  montarNivel(proximo);
});

/* =========================================================
   INICIAR
   ========================================================= */
montarNivel(0);
</script>
