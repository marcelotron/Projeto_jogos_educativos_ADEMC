<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Categorize os Animais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Lilita+One&display=swap" rel="stylesheet">
<style>
:root {
  --wood-dark: #4A2511;
  --wood-mid: #8B4513;
  --wood-light: #B8763C;
  --wood-highlight: #D9A066;
  --gold: #FFD43B;
  --gold-dark: #F59E0B;
  --paper: #FFF8E7;
  --paper-shadow: #E8DCC0;
  --success: #4ADE80;
  --error: #EF4444;
  --scene-title: #FFD43B;
  --scene-box-border: var(--wood-dark);
  --scene-box-bg: linear-gradient(135deg, var(--wood-light) 0%, var(--wood-mid) 50%, var(--wood-light) 100%);
  --scene-inner-bg: radial-gradient(ellipse at top, var(--paper) 0%, var(--paper-shadow) 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0F1419;
  font-family: 'Fredoka', system-ui, sans-serif;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body { display: flex; align-items: center; justify-content: center; }

#game {
  position: relative;
  width: 100vw; height: 100vh;
  max-width: min(100vw, calc(100vh * 16 / 9));
  max-height: min(100vh, calc(100vw * 9 / 16));
  overflow: hidden;
  box-shadow: 0 0 60px rgba(0,0,0,0.7);
}

/* ====== Scene theming ====== */
#game[data-scene="floresta"] { --scene-title: #FFD43B; --scene-box-border: #3A6010; --scene-box-bg: linear-gradient(135deg, #6A8C38 0%, #4A6A20 50%, #5A7C2C 100%); --scene-inner-bg: radial-gradient(ellipse at top, #F0FFE0 0%, #D8EFC0 100%); }
#game[data-scene="oceano"]   { --scene-title: #7DDFFF; --scene-box-border: #0A4A7C; --scene-box-bg: linear-gradient(135deg, #1A6BAA 0%, #0A4A7C 50%, #1A6BAA 100%); --scene-inner-bg: radial-gradient(ellipse at top, #D0F4FF 0%, #A0DCEE 100%); }
#game[data-scene="ceu"]      { --scene-title: #FFFAAA; --scene-box-border: #2A5090; --scene-box-bg: linear-gradient(135deg, #5A90D8 0%, #2A60B0 50%, #4A80C8 100%); --scene-inner-bg: radial-gradient(ellipse at top, #E8F4FF 0%, #C8DCFF 100%); }
#game[data-scene="savana"]   { --scene-title: #FFB830; --scene-box-border: #7A3010; --scene-box-bg: linear-gradient(135deg, #C86020 0%, #8A3A10 50%, #B05018 100%); --scene-inner-bg: radial-gradient(ellipse at top, #FFF0D0 0%, #F0D8A0 100%); }
#game[data-scene="fazenda"]  { --scene-title: #CCFF66; --scene-box-border: #2A5A10; --scene-box-bg: linear-gradient(135deg, #4A8C20 0%, #2A6010 50%, #3A7818 100%); --scene-inner-bg: radial-gradient(ellipse at top, #F0FFE8 0%, #D8F0C0 100%); }
#game[data-scene="selva"]    { --scene-title: #88FFCC; --scene-box-border: #0A3A1A; --scene-box-bg: linear-gradient(135deg, #1A5A30 0%, #0A3A1A 50%, #1A4A28 100%); --scene-inner-bg: radial-gradient(ellipse at top, #D0FFE8 0%, #A0DCBC 100%); }

/* ====== Background SVG ====== */
.bg-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.bg-svg.fade-out { opacity: 0; }

/* ====== Scene animations ====== */
.cloud { animation: drift 60s linear infinite; }
.cloud-2 { animation-duration: 90s; animation-delay: -30s; }
.cloud-3 { animation-duration: 75s; animation-delay: -45s; }
@keyframes drift {
  from { transform: translateX(-220px); }
  to   { transform: translateX(1800px); }
}

.bubble {
  animation: bubble-rise 5s ease-in infinite;
  transform-origin: center bottom;
}
.bubble:nth-child(2) { animation-delay: -1.6s; }
.bubble:nth-child(3) { animation-delay: -3.2s; }
.bubble:nth-child(4) { animation-delay: -0.8s; }
.bubble:nth-child(5) { animation-delay: -4.0s; }
@keyframes bubble-rise {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.7; }
  80%  { opacity: 0.4; }
  100% { transform: translate(var(--bx,8px), -260px) scale(0.4); opacity: 0; }
}

.seaweed { animation: sway 3.5s ease-in-out infinite; transform-origin: bottom center; }
.seaweed:nth-child(odd) { animation-direction: alternate-reverse; }
@keyframes sway {
  0%, 100% { transform: rotate(-8deg) scaleX(1); }
  50%       { transform: rotate(8deg) scaleX(0.96); }
}

.firefly { animation: flicker 2s ease-in-out infinite; }
.firefly:nth-child(2) { animation-delay: -0.7s; animation-duration: 2.8s; }
.firefly:nth-child(3) { animation-delay: -1.4s; animation-duration: 1.6s; }
.firefly:nth-child(4) { animation-delay: -2.1s; animation-duration: 3.2s; }
.firefly:nth-child(5) { animation-delay: -0.3s; animation-duration: 2.4s; }
@keyframes flicker {
  0%, 100% { opacity: 0.1; r: 3; }
  40%, 60% { opacity: 0.95; r: 5; }
}

.grass-tip { animation: grass-wave 2.5s ease-in-out infinite; transform-origin: bottom center; }
.grass-tip:nth-child(odd) { animation-direction: alternate-reverse; animation-duration: 3.2s; }
@keyframes grass-wave {
  0%, 100% { transform: rotate(-6deg); }
  50%       { transform: rotate(6deg); }
}

/* ====== HUD ====== */
#hud {
  position: absolute; top: 2.5%; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 14px; z-index: 100;
}
.counter {
  background: linear-gradient(180deg, var(--wood-light) 0%, var(--wood-mid) 100%);
  border: 3px solid var(--wood-dark); border-radius: 14px;
  padding: 4px 16px 4px 12px;
  color: white; font-family: 'Lilita One', cursive;
  font-size: clamp(20px, 2.6vw, 30px);
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 0 var(--wood-dark), 0 6px 16px rgba(0,0,0,0.4);
  letter-spacing: 1px;
}
.counter .icon { font-size: 1.2em; filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.4)); }
.counter.correct .icon { color: var(--success); }
.counter.wrong   .icon { color: var(--error); }

#soundToggle {
  position: absolute; top: 2.5%; right: 2%;
  width: clamp(48px, 5.5vw, 70px); height: clamp(48px, 5.5vw, 70px);
  background: radial-gradient(circle at 30% 30%, var(--wood-highlight) 0%, var(--wood-mid) 70%, var(--wood-dark) 100%);
  border-radius: 50%; border: 3px solid var(--wood-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(22px, 2.8vw, 32px); cursor: pointer; z-index: 100;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 -3px 0 rgba(0,0,0,0.2);
  transition: transform 0.15s;
}
#soundToggle:active { transform: scale(0.92); }
#soundToggle.muted  { filter: grayscale(0.7) brightness(0.7); }
#soundToggle.muted::after {
  content: '';
  position: absolute; inset: 18%;
  border-top: 4px solid var(--error);
  transform: rotate(-45deg); transform-origin: center;
}

/* ====== Drop Box ====== */
#box {
  position: absolute; left: 2.5%; top: 16%; width: 38%; height: 76%;
  background: var(--scene-box-bg);
  border-radius: 18px; padding: clamp(6px,1vw,12px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.5), inset 0 -5px 0 rgba(0,0,0,0.25), inset 0 3px 0 rgba(255,255,255,0.2);
  border: 4px solid var(--scene-box-border);
  z-index: 5; display: flex; flex-direction: column;
  transition: border-color 0.5s ease, background 0.5s ease;
}
/* nails in all 4 corners */
#box::before { content: ''; position: absolute; top: 8px; left: 8px; width: 12px; height: 12px; background: radial-gradient(circle, #2A1808 30%, #6b3d1f 70%); border-radius: 50%; box-shadow: inset 0 -1px 2px rgba(0,0,0,0.5), 0 1px 2px rgba(255,255,255,0.15); }
#box::after  { content: ''; position: absolute; top: 8px; right: 8px; width: 12px; height: 12px; background: radial-gradient(circle, #2A1808 30%, #6b3d1f 70%); border-radius: 50%; box-shadow: inset 0 -1px 2px rgba(0,0,0,0.5), 0 1px 2px rgba(255,255,255,0.15); }
.box-nail-bl { position: absolute; bottom: 8px; left: 8px; width: 12px; height: 12px; background: radial-gradient(circle, #2A1808 30%, #6b3d1f 70%); border-radius: 50%; box-shadow: inset 0 -1px 2px rgba(0,0,0,0.5), 0 1px 2px rgba(255,255,255,0.15); pointer-events: none; z-index: 2; }
.box-nail-br { position: absolute; bottom: 8px; right: 8px; width: 12px; height: 12px; background: radial-gradient(circle, #2A1808 30%, #6b3d1f 70%); border-radius: 50%; box-shadow: inset 0 -1px 2px rgba(0,0,0,0.5), 0 1px 2px rgba(255,255,255,0.15); pointer-events: none; z-index: 2; }

#categoryTitle {
  font-family: 'Lilita One', cursive;
  text-align: center;
  font-size: clamp(18px, 3vw, 36px);
  color: var(--scene-title);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.5), -1px -1px 0 rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.2);
  padding: 4px 8px 10px;
  letter-spacing: 1.5px; line-height: 1.1;
  transition: color 0.5s ease;
}

#boxContents {
  flex: 1;
  background: var(--scene-inner-bg);
  border-radius: 12px;
  display: flex; flex-wrap: wrap;
  align-content: center; justify-content: center;
  gap: clamp(4px,0.8vw,10px); padding: clamp(8px,1.2vw,16px);
  overflow: hidden;
  box-shadow: inset 0 3px 10px rgba(0,0,0,0.2);
  transition: background 0.5s ease;
}

.placed-animal {
  font-size: clamp(32px,4.2vw,52px); line-height: 1;
  filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.3));
  animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes pop {
  0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
  60%  { transform: scale(1.28) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}

/* ====== Action buttons ====== */
#actionButtons {
  position: absolute; right: 2.5%; top: 22%;
  display: flex; flex-direction: column;
  gap: clamp(10px,1.6vw,20px); z-index: 100; align-items: stretch;
}

.btn {
  background: linear-gradient(180deg, #9CCC65 0%, #689F38 100%);
  border: 4px solid #33691E; border-radius: 18px;
  padding: clamp(6px,1vw,12px) clamp(16px,2.4vw,32px);
  font-family: 'Lilita One', cursive;
  font-size: clamp(18px,2.4vw,30px);
  color: white; cursor: pointer; letter-spacing: 2.5px;
  box-shadow: 0 5px 0 #33691E, 0 7px 16px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.3);
  transition: transform 0.1s, box-shadow 0.1s, filter 0.2s;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  min-width: clamp(110px,14vw,170px);
}
.btn:active:not(:disabled) {
  transform: translateY(4px);
  box-shadow: 0 1px 0 #33691E, 0 2px 6px rgba(0,0,0,0.3), inset 0 -1px 0 rgba(0,0,0,0.15);
}
.btn:disabled { filter: grayscale(0.6) brightness(0.8); opacity: 0.5; cursor: not-allowed; }
.btn.next-ready { animation: readyPulse 1.1s ease-in-out infinite; }
@keyframes readyPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 5px 0 #33691E, 0 7px 16px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.3); }
  50%       { transform: scale(1.07); box-shadow: 0 5px 0 #33691E, 0 12px 28px rgba(255,212,59,0.65), inset 0 -3px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.3); }
}

#doneBtn {
  background: linear-gradient(180deg, var(--wood-highlight) 0%, var(--wood-mid) 100%);
  border-color: var(--wood-dark);
  box-shadow: 0 5px 0 var(--wood-dark), 0 7px 16px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.25);
}
#doneBtn:active:not(:disabled) { box-shadow: 0 1px 0 var(--wood-dark), 0 2px 6px rgba(0,0,0,0.3); }

/* ====== Progress ====== */
#progress {
  position: absolute; bottom: 3%; right: 2.5%;
  background: linear-gradient(180deg, var(--wood-light) 0%, var(--wood-mid) 100%);
  border: 3px solid var(--wood-dark); border-radius: 14px;
  padding: 4px 16px; color: white;
  font-family: 'Lilita One', cursive; font-size: clamp(18px,2.4vw,28px);
  z-index: 100; box-shadow: 0 4px 0 var(--wood-dark), 0 6px 14px rgba(0,0,0,0.35);
  letter-spacing: 1px;
}

/* ====== Animals ====== */
.animal {
  position: absolute;
  font-size: clamp(48px,7vw,90px);
  cursor: grab; z-index: 10;
  filter: drop-shadow(3px 5px 4px rgba(0,0,0,0.4));
  line-height: 1; user-select: none; -webkit-user-drag: none;
  transition: transform 0.2s, filter 0.2s;
  animation: idle 3s ease-in-out infinite;
  will-change: transform;
}
.animal::before {
  content: '';
  position: absolute; inset: -10%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%);
  pointer-events: none;
  transition: opacity 0.2s;
  opacity: 0;
}
.animal:hover::before { opacity: 1; }
@keyframes idle {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50%       { transform: translateY(-5px) rotate(1.5deg); }
}
.animal:hover { transform: scale(1.1); filter: drop-shadow(4px 6px 6px rgba(0,0,0,0.5)); }
.animal:active { cursor: grabbing; }
.animal.dragging {
  z-index: 1000; animation: none;
  transform: scale(1.18) rotate(-7deg);
  filter: drop-shadow(6px 12px 10px rgba(0,0,0,0.55));
  transition: none;
}
.animal.shake { animation: shake 0.5s; }
@keyframes shake {
  0%, 100% { transform: translateX(0) rotate(0); }
  15%  { transform: translateX(-16px) rotate(-14deg); }
  30%  { transform: translateX(16px) rotate(14deg); }
  45%  { transform: translateX(-12px) rotate(-9deg); }
  60%  { transform: translateX(10px) rotate(8deg); }
  75%  { transform: translateX(-5px) rotate(-3deg); }
}
.animal.placed { pointer-events: none; opacity: 0; }
.animal.returning { transition: left 0.38s cubic-bezier(0.34, 1.3, 0.64, 1), top 0.38s cubic-bezier(0.34, 1.3, 0.64, 1); }

/* ====== Sparkles ====== */
.sparkle {
  position: absolute; pointer-events: none; z-index: 999;
  font-size: clamp(18px,2.5vw,26px);
  animation: sparkleOut 0.9s ease-out forwards;
}
@keyframes sparkleOut {
  0%   { transform: translate(0,0) scale(0) rotate(0); opacity: 1; }
  50%  { opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(1.3) rotate(360deg); opacity: 0; }
}

/* ====== Overlays ====== */
.overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 500; animation: fadeIn 0.3s;
}
.overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.phase-card, .final-card, .start-card {
  background: radial-gradient(ellipse at top left, #FFE566 0%, #F59E0B 100%);
  padding: clamp(20px,4vw,50px) clamp(30px,6vw,80px);
  border-radius: 28px; border: 6px solid var(--wood-dark);
  text-align: center;
  box-shadow: 0 16px 50px rgba(0,0,0,0.7), inset 0 -6px 0 rgba(0,0,0,0.18), inset 0 3px 0 rgba(255,255,255,0.4);
  animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 82%;
}
@keyframes bounceIn {
  0%   { transform: scale(0.2) rotate(-180deg); opacity: 0; }
  60%  { transform: scale(1.1) rotate(8deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}
.phase-card h2, .final-card h1, .start-card h1 {
  font-family: 'Lilita One', cursive; color: var(--wood-dark);
  text-shadow: 3px 3px 0 #FFF8CC, 5px 5px 0 rgba(0,0,0,0.15);
  letter-spacing: 2px; line-height: 1.1;
}
.phase-card h2 { font-size: clamp(26px,4.2vw,46px); margin-bottom: 6px; }
.final-card h1, .start-card h1 { font-size: clamp(30px,5vw,58px); margin-bottom: 14px; }
.phase-card p, .final-card p, .start-card p {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: clamp(15px,2.2vw,23px); color: var(--wood-dark); margin: 6px 0;
}
.phase-scene-icon { font-size: clamp(36px,5.5vw,60px); margin: 4px 0; }
.stars { font-size: clamp(38px,6vw,68px); margin: 12px 0; letter-spacing: 4px; }

#playAgainBtn, #startBtn { margin-top: clamp(14px,2.5vw,24px); }

/* ====== Portrait warning ====== */
#rotateMsg {
  display: none; position: fixed; inset: 0; background: #0F1419;
  color: white; z-index: 9999;
  align-items: center; justify-content: center; flex-direction: column;
  text-align: center; padding: 20px; font-family: 'Fredoka', sans-serif;
}
#rotateMsg .icon { font-size: 60px; animation: rotate90 2s ease-in-out infinite; }
#rotateMsg p { font-size: 20px; margin-top: 16px; max-width: 280px; }
@keyframes rotate90 { 0%, 40% { transform: rotate(0); } 60%, 100% { transform: rotate(90deg); } }
@media (orientation: portrait) and (max-width: 700px) { #rotateMsg { display: flex; } }

/* ====== History overlay ====== */
.history-card {
  background: radial-gradient(ellipse at top left, #FFE566 0%, #F59E0B 100%);
  padding: clamp(16px,3vw,32px) clamp(20px,4vw,48px) clamp(14px,2.5vw,24px);
  border-radius: 28px; border: 6px solid var(--wood-dark); text-align: center;
  box-shadow: 0 16px 50px rgba(0,0,0,0.7), inset 0 -6px 0 rgba(0,0,0,0.18), inset 0 3px 0 rgba(255,255,255,0.4);
  max-width: 88%; width: 700px; max-height: 80vh;
  display: flex; flex-direction: column;
  animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.history-card h1 {
  font-family: 'Lilita One', cursive; color: var(--wood-dark);
  text-shadow: 3px 3px 0 #FFF8CC, 5px 5px 0 rgba(0,0,0,0.15);
  letter-spacing: 2px; font-size: clamp(24px,3.8vw,44px); margin-bottom: 2px;
}
.history-card .hist-sub {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: clamp(13px,1.8vw,18px); color: var(--wood-dark); margin: 0 0 10px;
}
#historyContent { overflow-y: auto; flex: 1; padding: 2px 4px; scrollbar-width: thin; scrollbar-color: var(--wood-dark) #F59E0B; }
#historyContent::-webkit-scrollbar { width: 6px; }
#historyContent::-webkit-scrollbar-thumb { background: var(--wood-dark); border-radius: 3px; }
.hist-entry {
  background: linear-gradient(180deg, var(--wood-light) 0%, var(--wood-mid) 100%);
  border: 3px solid var(--wood-dark); border-radius: 14px;
  padding: 7px 12px; margin-bottom: 7px;
  display: flex; align-items: center; gap: 10px;
}
.hist-stars { font-size: clamp(16px,2.2vw,24px); flex-shrink: 0; letter-spacing: 1px; }
.hist-date { font-family: 'Fredoka', sans-serif; font-size: clamp(11px,1.3vw,14px); color: rgba(255,255,255,0.85); flex-shrink: 0; min-width: 58px; text-align: left; }
.hist-stats-row { display: flex; gap: 5px; flex: 1; justify-content: flex-end; }
.hist-stat-col { background: radial-gradient(ellipse at top, var(--paper) 0%, var(--paper-shadow) 100%); border: 2px solid var(--wood-dark); border-radius: 10px; padding: 4px 7px; text-align: center; min-width: 50px; }
.hist-stat-val { font-family: 'Lilita One', cursive; font-size: clamp(14px,1.8vw,19px); color: var(--wood-dark); display: block; line-height: 1; }
.hist-stat-delta { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(10px,1.3vw,13px); display: block; min-height: 13px; line-height: 1; }
.hist-stat-lbl { font-family: 'Fredoka', sans-serif; font-size: clamp(9px,1.1vw,11px); color: var(--wood-dark); opacity: 0.65; text-transform: uppercase; letter-spacing: .05em; display: block; margin-top: 1px; }
.d-up   { color: #1a7a28; }
.d-down { color: var(--error); }
.d-same { color: var(--wood-mid); }
.hist-empty { font-family: 'Fredoka', sans-serif; font-weight: 600; color: var(--wood-dark); font-size: clamp(14px,2vw,20px); padding: 28px 0; line-height: 1.9; }
.hist-actions { display: flex; gap: 12px; justify-content: center; margin-top: 12px; flex-shrink: 0; }
.btn-wood {
  background: linear-gradient(180deg, var(--wood-highlight) 0%, var(--wood-mid) 100%) !important;
  border-color: var(--wood-dark) !important;
  box-shadow: 0 5px 0 var(--wood-dark), 0 7px 16px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.25) !important;
}
.btn-wood:active:not(:disabled) { box-shadow: 0 1px 0 var(--wood-dark), 0 2px 6px rgba(0,0,0,0.3) !important; }
</style>
</head>

<div id="rotateMsg">

  </div>

  <div id="actionButtons">
    <button class="btn" id="doneBtn">PULAR</button>
    <button class="btn" id="nextBtn" disabled>PRÓXIMO</button>

  <div id="progress">1/16</div>

  <div id="animalsArea"></div>

  <div class="overlay" id="startScreen">
    <div class="start-card">

      <button class="btn" id="startBtn">COMEÇAR</button>

  </div>

  { emoji: '🐺', name: 'Lobo',          tags: ['terrestre','carnivoro','mamifero','selvagem','predador','pelo'] },
  { emoji: '🦊', name: 'Raposa',        tags: ['terrestre','carnivoro','mamifero','selvagem','predador','pelo'] },
  { emoji: '🐒', name: 'Macaco',        tags: ['terrestre','onivoro','mamifero','selvagem','pelo'] },
  { emoji: '🐸', name: 'Sapo',          tags: ['terrestre','aquatico','carnivoro','anfibio','selvagem','nada'] },
  { emoji: '🦍', name: 'Gorila',        tags: ['terrestre','herbivoro','mamifero','selvagem','pelo','africa'] },
  { emoji: '🦩', name: 'Flamingo',      tags: ['aquatico','ave','selvagem','africa','nada','voa'] },
  { emoji: '🐡', name: 'Baiacu',        tags: ['marinho','aquatico','peixe','selvagem','nada'] },
  { emoji: '🦇', name: 'Morcego',       tags: ['terrestre','carnivoro','mamifero','selvagem','pelo','voa'] },
];

const PHASES = [
  { title: 'Animais Terrestres',   tag: 'terrestre' },
  { title: 'Animais Marinhos',     tag: 'marinho'   },
  { title: 'Herbívoros',           tag: 'herbivoro' },
  { title: 'Carnívoros',           tag: 'carnivoro' },
  { title: 'Onívoros',             tag: 'onivoro'   },
  { title: 'Aves',                 tag: 'ave'       },
  { title: 'Mamíferos',            tag: 'mamifero'  },
  { title: 'Répteis',              tag: 'reptil'    },
  { title: 'Insetos',              tag: 'inseto'    },
  { title: 'Peixes',               tag: 'peixe'     },
  { title: 'Animais de Fazenda',   tag: 'fazenda'   },
  { title: 'Animais de Estimação', tag: 'estimacao' },
  { title: 'Animais que Voam',     tag: 'voa'       },
];

// =========================================================================
// GAME STATE
// =========================================================================
const state = {
  phaseIndex: 0,
  correctCount: 0,
  wrongCount: 0,
  remainingCorrect: 0,
  currentScene: 'floresta',
};

// =========================================================================
// AUDIO
// =========================================================================
let audioCtx = null;
let soundEnabled = true;

function getCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tone(freq, dur, type = 'sine', vol = 0.2, delay = 0) {
  if (!soundEnabled) return;
  setTimeout(() => {
    const ctx = getCtx(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur + 0.02);
  }, delay);
}

function slide(fStart, fEnd, dur, type = 'sine', vol = 0.18) {
  if (!soundEnabled) return;
  const ctx = getCtx(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(fStart, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(fEnd, ctx.currentTime + dur);
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + dur + 0.02);
}

const sfx = {
  correct: () => { tone(523,0.1,'triangle',0.2); tone(659,0.1,'triangle',0.2,80); tone(784,0.18,'triangle',0.22,160); },
  wrong:   () => slide(280, 110, 0.4, 'sawtooth', 0.16),
  pickup:  () => tone(700, 0.05, 'sine', 0.08),
  drop:    () => tone(280, 0.07, 'triangle', 0.1),
  complete: () => { [523,659,784,1047,1319].forEach((f,i) => tone(f,0.16,'triangle',0.22,i*80)); },
  newPhase: () => { tone(392,0.12,'triangle',0.18); tone(523,0.12,'triangle',0.18,100); tone(659,0.18,'triangle',0.2,200); },
  hoverBox: () => tone(880, 0.04, 'sine', 0.06),
};

// =========================================================================
// UTILITIES
// =========================================================================
const $ = id => document.getElementById(id);
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
function getGameRect() { return $('game').getBoundingClientRect(); }

// =========================================================================
// SCENE MANAGEMENT
// =========================================================================
function setScene(tag) {
  const sceneName = PHASE_SCENES[tag] || 'floresta';
  state.currentScene = sceneName;
  $('bgSvg').innerHTML = SCENES[sceneName];
  $('game').setAttribute('data-scene', sceneName);
}

// =========================================================================
// PHASE RENDERING
// =========================================================================
function pickAnimalsForPhase(phase) {
  const correctPool = ANIMALS.filter(a => a.tags.includes(phase.tag));
  const wrongPool   = ANIMALS.filter(a => !a.tags.includes(phase.tag));
  const numCorrect = Math.min(correctPool.length, 3 + Math.floor(Math.random() * 3));
  const numWrong   = Math.min(wrongPool.length, 3 + Math.floor(Math.random() * 2));
  return shuffle([
    ...shuffle(correctPool).slice(0, numCorrect),
    ...shuffle(wrongPool).slice(0, numWrong),
  ]);
}

function generatePositions(count, gameW, gameH) {
  const minX = gameW * 0.46;
  const maxX = gameW * 0.94;
  const minY = gameH * 0.04;
  const maxY = gameH * 0.86;
  const minDist = Math.min(gameW, gameH) * 0.12;
  const gameRect = $('game').getBoundingClientRect();
  const animalPad = Math.min(gameW, gameH) * 0.13;
  const forbiddenZones = ['actionButtons','hud','soundToggle','progress']
    .map(id => $(id)).filter(el => el)
    .map(el => {
      const r = el.getBoundingClientRect();
      return { left: r.left - gameRect.left - animalPad, right: r.right - gameRect.left, top: r.top - gameRect.top - animalPad, bottom: r.bottom - gameRect.top };
    });
  const inForbidden = p => forbiddenZones.some(f => p.x >= f.left && p.x <= f.right && p.y >= f.top && p.y <= f.bottom);
  const positions = [];
  for (let i = 0; i < count; i++) {
    let pos, attempts = 0;
    do {
      pos = { x: minX + Math.random() * (maxX - minX), y: minY + Math.random() * (maxY - minY) };
      attempts++;
    } while (attempts < 150 && (inForbidden(pos) || positions.some(p => Math.hypot(p.x - pos.x, p.y - pos.y) < minDist)));
    positions.push(pos);
  }
  return positions;
}

function renderPhase() {
  const phase = PHASES[state.phaseIndex];
  setScene(phase.tag);
  $('categoryTitle').textContent = phase.title;
  $('progress').textContent = `${state.phaseIndex + 1}/${PHASES.length}`;
  $('boxContents').innerHTML = '';
  $('animalsArea').innerHTML = '';
  $('nextBtn').disabled = true;
  $('nextBtn').classList.remove('next-ready');

  const animals = pickAnimalsForPhase(phase);
  state.remainingCorrect = animals.filter(a => a.tags.includes(phase.tag)).length;

  const { width, height } = getGameRect();
  const positions = generatePositions(animals.length, width, height);
  const area = $('animalsArea');

  animals.forEach((animal, i) => {
    const el = document.createElement('div');
    el.className = 'animal';
    el.textContent = animal.emoji;
    el.style.left = positions[i].x + 'px';
    el.style.top  = positions[i].y + 'px';
    el.style.animationDelay = (Math.random() * 2) + 's';
    el.dataset.tags   = animal.tags.join(',');
    el.dataset.emoji  = animal.emoji;
    el.dataset.startX = positions[i].x;
    el.dataset.startY = positions[i].y;
    el.title = animal.name;
    el.addEventListener('pointerdown', e => startDrag(e, el));
    area.appendChild(el);
  });
}

// =========================================================================
// DRAG AND DROP
// =========================================================================
let dragging = null;
let wasOverBox = false;

function startDrag(e, el) {
  if (el.classList.contains('placed') || dragging) return;
  e.preventDefault();
  const elRect = el.getBoundingClientRect();
  dragging = { el, offsetX: e.clientX - elRect.left, offsetY: e.clientY - elRect.top, pointerId: e.pointerId };
  el.classList.add('dragging');
  el.classList.remove('returning');
  try { el.setPointerCapture(e.pointerId); } catch {}
  sfx.pickup();
  wasOverBox = false;
  el.addEventListener('pointermove', onDragMove);
  el.addEventListener('pointerup', onDragEnd);
  el.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const gameRect = getGameRect();
  const x = e.clientX - gameRect.left - dragging.offsetX;
  const y = e.clientY - gameRect.top  - dragging.offsetY;
  dragging.el.style.left = x + 'px';
  dragging.el.style.top  = y + 'px';
  const inBox = isOverBox(dragging.el);
  if (inBox && !wasOverBox) { sfx.hoverBox(); wasOverBox = true; }
  else if (!inBox) { wasOverBox = false; }
}

function isOverBox(el) {
  const boxRect = $('box').getBoundingClientRect();
  const elRect  = el.getBoundingClientRect();
  const cx = elRect.left + elRect.width  / 2;
  const cy = elRect.top  + elRect.height / 2;
  return cx >= boxRect.left && cx <= boxRect.right && cy >= boxRect.top && cy <= boxRect.bottom;
}

function onDragEnd(e) {
  if (!dragging) return;
  const el = dragging.el;
  el.removeEventListener('pointermove', onDragMove);
  el.removeEventListener('pointerup', onDragEnd);
  el.removeEventListener('pointercancel', onDragEnd);
  const inBox = isOverBox(el);
  el.classList.remove('dragging');
  if (inBox) {
    const phase = PHASES[state.phaseIndex];
    const tags  = el.dataset.tags.split(',');
    if (tags.includes(phase.tag)) handleCorrect(el);
    else handleWrong(el);
  } else {
    returnToStart(el);
  }
  dragging = null;
}

// =========================================================================
// CORRECT / WRONG HANDLING
// =========================================================================
function handleCorrect(el) {
  state.correctCount++;
  state.remainingCorrect--;
  $('correctCount').textContent = state.correctCount;
  spawnSparkles(el);
  const placed = document.createElement('div');
  placed.className = 'placed-animal';
  placed.textContent = el.dataset.emoji;
  $('boxContents').appendChild(placed);
  el.classList.add('placed');
  setTimeout(() => el.remove(), 100);
  sfx.correct();
  if (state.remainingCorrect <= 0) {
    $('nextBtn').disabled = false;
    $('nextBtn').classList.add('next-ready');
    setTimeout(() => sfx.complete(), 250);
  }
}

function handleWrong(el) {
  state.wrongCount++;
  $('wrongCount').textContent = state.wrongCount;
  sfx.wrong();
  el.classList.add('shake');
  setTimeout(() => { el.classList.remove('shake'); returnToStart(el); }, 500);
}

function returnToStart(el) {
  el.classList.add('returning');
  el.style.left = el.dataset.startX + 'px';
  el.style.top  = el.dataset.startY + 'px';
  setTimeout(() => el.classList.remove('returning'), 400);
  sfx.drop();
}

function spawnSparkles(el) {
  const game = $('game');
  const gameRect = getGameRect();
  const elRect = el.getBoundingClientRect();
  const cx = elRect.left - gameRect.left + elRect.width  / 2;
  const cy = elRect.top  - gameRect.top  + elRect.height / 2;
  const symbols = SCENE_SPARKLES[state.currentScene] || ['✨','⭐','💫','🌟'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = symbols[i % symbols.length];
    s.style.left = cx + 'px';
    s.style.top  = cy + 'px';
    const angle = (i / 10) * Math.PI * 2;
    const dist  = 55 + Math.random() * 55;
    s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    game.appendChild(s);
    setTimeout(() => s.remove(), 950);
  }
}

// =========================================================================
// FLOW CONTROL
// =========================================================================
function nextPhase() {
  state.phaseIndex++;
  if (state.phaseIndex >= PHASES.length) { showFinal(); return; }
  showPhaseTransition();
}

function showPhaseTransition() {
  const phase = PHASES[state.phaseIndex];
  const sceneName = PHASE_SCENES[phase.tag] || 'floresta';
  $('phaseCardIcon').textContent = SCENE_ICONS[sceneName] || '🌍';
  $('phaseCardTitle').textContent = phase.title;
  $('phaseCardSubtitle').textContent = `Fase ${state.phaseIndex + 1} de ${PHASES.length}`;
  const overlay = $('phaseTransition');
  overlay.classList.add('show');
  sfx.newPhase();
  setTimeout(() => { overlay.classList.remove('show'); renderPhase(); }, 1500);
}

function showFinal() {
  saveResult();
  $('finalCorrect').textContent = state.correctCount;
  $('finalWrong').textContent   = state.wrongCount;
  const total = state.correctCount + state.wrongCount;
  const ratio = total > 0 ? state.correctCount / total : 0;
  let stars = '⭐';
  if (ratio > 0.6)  stars = '⭐⭐';
  if (ratio > 0.85) stars = '⭐⭐⭐';
  $('finalStars').textContent = stars;
  $('finalScreen').classList.add('show');
  sfx.complete();
  setTimeout(sfx.complete, 500);
}

function restartGame() {
  state.phaseIndex = 0;
  state.correctCount = 0;
  state.wrongCount = 0;
  $('correctCount').textContent = 0;
  $('wrongCount').textContent   = 0;
  $('finalScreen').classList.remove('show');
  showPhaseTransition();
}

// =========================================================================
// HISTORY / COMPARISON
// =========================================================================
const HIST_KEY = 'animalgame_history';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
  catch { return []; }
}

function saveResult() {
  const history = loadHistory();
  const total = state.correctCount + state.wrongCount;
  const ratio = total > 0 ? state.correctCount / total : 0;
  const stars = ratio > 0.85 ? 3 : ratio > 0.6 ? 2 : 1;
  history.push({
    ts: Date.now(),
    date: new Date().toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }),
    acertos: state.correctCount,
    erros:   state.wrongCount,
    estrelas: stars,
    precisao: Math.round(ratio * 100),
  });
  if (history.length > 50) history.splice(0, history.length - 50);
  localStorage.setItem(HIST_KEY, JSON.stringify(history));
}

function deltaBadge(current, prev, lowerIsBetter) {
  if (prev == null) return '<span class="d-same">1ª</span>';
  const diff = current - prev;
  if (diff === 0) return '<span class="d-same">=</span>';
  const better = lowerIsBetter ? diff < 0 : diff > 0;
  const arrow = diff > 0 ? '▲' : '▼';
  return `<span class="${better ? 'd-up' : 'd-down'}">${arrow}${Math.abs(diff)}</span>`;
}

function renderHistory() {
  const history = loadHistory();
  const content = $('historyContent');
  if (history.length === 0) {
    content.innerHTML = '<p class="hist-empty">Nenhuma partida registrada ainda.<br>Conclua uma partida completa<br>para ver seu histórico! 🐾</p>';
    return;
  }
  const starsText = n => '⭐'.repeat(n);
  const reversed = [...history].reverse();
  let html = '';
  reversed.forEach((entry, i) => {
    const prev = reversed[i + 1] || null;
    const dAcertos = deltaBadge(entry.acertos,  prev?.acertos,  false);
    const dErros   = deltaBadge(entry.erros,    prev?.erros,    true);
    const dPrec    = deltaBadge(entry.precisao, prev?.precisao, false);
    html += `
      <div class="hist-entry">
        <div class="hist-stars">${starsText(entry.estrelas)}</div>
        <div class="hist-date">${entry.date}</div>
        <div class="hist-stats-row">
          <div class="hist-stat-col">
            <span class="hist-stat-val">✓${entry.acertos}</span>
            <span class="hist-stat-delta">${dAcertos}</span>
            <span class="hist-stat-lbl">Acertos</span>
          </div>
          <div class="hist-stat-col">
            <span class="hist-stat-val">✗${entry.erros}</span>
            <span class="hist-stat-delta">${dErros}</span>
            <span class="hist-stat-lbl">Erros</span>
          </div>
          <div class="hist-stat-col">
            <span class="hist-stat-val">${entry.precisao}%</span>
            <span class="hist-stat-delta">${dPrec}</span>
            <span class="hist-stat-lbl">Precisão</span>
          </div>
        </div>
      </div>`;
  });
  content.innerHTML = html;
}

function showHistory()  { renderHistory(); $('historyScreen').classList.add('show'); }
function closeHistory() { $('historyScreen').classList.remove('show'); }

// =========================================================================
// EVENT WIRING
// =========================================================================
$('startBtn').addEventListener('click', () => {
  getCtx();
  $('startScreen').classList.remove('show');
  showPhaseTransition();
});
$('nextBtn').addEventListener('click', () => { if (!$('nextBtn').disabled) nextPhase(); });
$('doneBtn').addEventListener('click', nextPhase);
$('playAgainBtn').addEventListener('click', restartGame);
$('btnHistory').addEventListener('click', () => { getCtx(); showHistory(); });
$('btnCloseHist').addEventListener('click', closeHistory);
$('btnClearHist').addEventListener('click', () => {
  if (confirm('Apagar todo o histórico de partidas?')) localStorage.removeItem(HIST_KEY);
  renderHistory();
});
$('soundToggle').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  $('soundToggle').classList.toggle('muted', !soundEnabled);
  if (soundEnabled) sfx.pickup();
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const remaining = document.querySelectorAll('.animal:not(.placed)');
    if (remaining.length === 0) return;
    const { width, height } = getGameRect();
    const positions = generatePositions(remaining.length, width, height);
    remaining.forEach((el, i) => {
      el.style.left = positions[i].x + 'px';
      el.style.top  = positions[i].y + 'px';
      el.dataset.startX = positions[i].x;
      el.dataset.startY = positions[i].y;
    });
  }, 200);
});

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('contextmenu', e => e.preventDefault());

// =========================================================================
// INIT — load floresta as starting background for the start screen
// =========================================================================
$('bgSvg').innerHTML = SCENES.floresta;
$('game').setAttribute('data-scene', 'floresta');
$('startScreen').classList.add('show');
</script>
